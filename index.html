<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunshine Coast Weather Stations</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    font-family: system-ui, sans-serif;
    background:#0b1020;
    color:#fff;
    margin:0;
    padding:0;
    text-align:center;
  }

  /* ---------- FULLSCREEN MODAL ---------- */
  #station-modal {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.85);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
  }
  #modal-box {
    background:#111628;
    padding:25px;
    border-radius:10px;
    width:90%;
    max-width:350px;
    border:1px solid #222842;
  }
  #modal-box h2 {
    margin-top:0;
    margin-bottom:15px;
  }
  select {
    width:100%;
    padding:10px;
    border-radius:6px;
    border:none;
    margin-bottom:15px;
    font-size:1rem;
  }
  #continue-btn {
    width:100%;
    padding:12px;
    background:#00e5ff;
    border:none;
    border-radius:6px;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
  }

  /* ---------- DASHBOARD ---------- */
  #dashboard { display:none; padding:20px; }

  .grid {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    margin-bottom:30px;
  }
  .card {
    background:#111628;
    padding:15px;
    border-radius:8px;
    border:1px solid #222842;
    min-height:190px;
    text-align:left;
  }
  .name {
    font-size:1.2rem;
    margin-bottom:8px;
    font-weight:bold;
    display:flex;
    align-items:center;
  }
  .station-icon {
    width:18px; height:18px;
    margin-right:8px;
  }
  .row { margin-bottom:6px; }

  /* ---------- COMPASS ---------- */
  #compass-container {
    position:relative;
    width:220px;
    height:260px;
    margin:0 auto;
  }
  #compass-base {
    width:220px; height:220px;
    border-radius:50%;
    border:2px solid #888;
    background:radial-gradient(circle at center,#1a1f33 60%,#0b1020 100%);
    position:relative;
    margin:0 auto;
  }
  .label {
    position:absolute;
    color:#fff;
    font-size:0.8rem;
    font-weight:bold;
  }
  .label.n { top:5px; left:50%; transform:translateX(-50%); }
  .label.s { bottom:5px; left:50%; transform:translateX(-50%); }
  .label.e { top:50%; right:5px; transform:translateY(-50%); }
  .label.w { top:50%; left:5px; transform:translateY(-50%); }

  #device-arrow, #wind-arrow {
    position:absolute;
    width:0; height:0;
    border-left:10px solid transparent;
    border-right:10px solid transparent;
    border-bottom:40px solid;
    left:50%; top:50%;
    transform-origin:center bottom;
  }
  #device-arrow { border-bottom-color:#ff5252; }
  #wind-arrow { border-bottom-color:#00e5ff; }

  .disclaimer {
    margin-top:20px;
    font-size:0.85rem;
    color:#aaa;
  }

  /* ---------- TILE-STYLE BUTTON ---------- */
  .tile-button {
    background:#111628;
    border:1px solid #222842;
    color:#fff;
    padding:12px 18px;
    border-radius:8px;
    font-size:1rem;
    margin-top:20px;
    cursor:pointer;
    width:220px;
    transition:background 0.2s, border-color 0.2s;
  }
  .tile-button:hover {
    background:#1a2038;
    border-color:#2f3654;
  }

  /* ---------- SPINNER ---------- */
  .spinner {
    width:28px;
    height:28px;
    border:4px solid #222842;
    border-top:4px solid #00e5ff;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
    margin:10px auto;
  }
  @keyframes spin {
    from { transform:rotate(0deg); }
    to   { transform:rotate(360deg); }
  }

  /* ---------- FADE + SLIDE-IN ---------- */
  .fade-in {
    opacity:0;
    transform:translateY(20px);
    animation:fadeSlideIn 0.45s ease-out forwards;
  }
  @keyframes fadeSlideIn {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }
</style>
</head>
<body>

<!-- ---------- FIRST LOAD MODAL ---------- -->
<div id="station-modal">
  <div id="modal-box">
    <h2>Select station for wind overlay</h2>
    <select id="station-select">
      <option value="sunshine">Sunshine Coast Airport</option>
      <option value="beerburrum">Beerburrum</option>
      <option value="nambour">Nambour</option>
      <option value="tewantin">Tewantin</option>
    </select>
    <button id="continue-btn">Continue</button>
  </div>
</div>

<!-- ---------- DASHBOARD ---------- -->
<div id="dashboard">

  <h1>Sunshine Coast Weather Stations</h1>

  <div class="grid">
    <div class="card">
      <div class="name">
        <img class="station-icon"
             src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='%23ff7043' viewBox='0 0 24 24'><circle cx='12' cy='12' r='10'/></svg>">
        Nambour
      </div>
      <div id="nambour"><div class="spinner"></div></div>
    </div>

    <div class="card">
      <div class="name">
        <img class="station-icon"
             src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='%2344aaff' viewBox='0 0 24 24'><circle cx='12' cy='12' r='10'/></svg>">
        Beerburrum
      </div>
      <div id="beerburrum"><div class="spinner"></div></div>
    </div>

    <div class="card">
      <div class="name">
        <img class="station-icon"
             src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='%2300e5ff' viewBox='0 0 24 24'><circle cx='12' cy='12' r='10'/></svg>">
        Sunshine Coast Airport
      </div>
      <div id="sunshine"><div class="spinner"></div></div>
    </div>

    <div class="card">
      <div class="name">
        <img class="station-icon"
             src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='%23ffeb3b' viewBox='0 0 24 24'><circle cx='12' cy='12' r='10'/></svg>">
        Tewantin
      </div>
      <div id="tewantin"><div class="spinner"></div></div>
    </div>
  </div>

  <div id="compass-container">
    <div id="compass-base">
      <div class="label n">N</div>
      <div class="label e">E</div>
      <div class="label s">S</div>
      <div class="label w">W</div>
      <div id="device-arrow"></div>
      <div id="wind-arrow"></div>
    </div>
    <p id="nearest-label" style="margin-top:10px;">Wind from: —</p>
  </div>

  <button id="change-station-btn" class="tile-button">Change Station</button>

  <p class="disclaimer">
    ⚠️ Data sourced from Open‑Meteo.
  </p>

</div>
<script>
/* ---------- COLOUR FUNCTIONS ---------- */
function windColour(s){return s<15?"#00e5ff":s<30?"#00bcd4":s<45?"#ffb74d":"#ff5252";}
function humidityColour(r){return r>60?"#44aaff":r>40?"#00e5ff":r>20?"#ffeb3b":"#ff5252";}
function tempColour(t){return t<15?"#44aaff":t<25?"#ffeb3b":t<32?"#ff9800":"#ff5252";}

/* ---------- STATION LIST ---------- */
const stations = {
  nambour:{name:"Nambour",lat:-26.63,lon:152.96},
  beerburrum:{name:"Beerburrum",lat:-26.95,lon:153.06},
  sunshine:{name:"Sunshine Coast Airport",lat:-26.60,lon:153.09},
  tewantin:{name:"Tewantin",lat:-26.39,lon:153.03}
};

/* ---------- DATE HELPER ---------- */
function getPastDate(d){
  const x=new Date();
  x.setDate(x.getDate()-d);
  return x.toISOString().split("T")[0];
}

/* ---------- FETCH WEATHER FOR ONE STATION ---------- */
async function loadStation(id){
  const st = stations[id];
  const nowUrl = "https://api.open-meteo.com/v1/forecast?"+new URLSearchParams({
    latitude:st.lat,
    longitude:st.lon,
    current:"temperature_2m,apparent_temperature,dew_point_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m,wind_gusts_10m",
    timezone:"Australia/Brisbane"
  });
  const rainUrl = "https://archive-api.open-meteo.com/v1/archive?"+new URLSearchParams({
    latitude:st.lat,
    longitude:st.lon,
    start_date:getPastDate(1),
    end_date:getPastDate(0),
    daily:"precipitation_sum",
    timezone:"Australia/Brisbane"
  });

  try{
    const [nowRes, rainRes] = await Promise.all([fetch(nowUrl), fetch(rainUrl)]);
    const now = await nowRes.json();
    const rain = await rainRes.json();
    const c = now.current;
    const rain24 = rain.daily?.precipitation_sum?.[0] ?? 0;

    st.windDir = c.wind_direction_10m;

    document.getElementById(id).innerHTML = `
      <div class="row" style="color:${tempColour(c.temperature_2m)}">Temp: ${c.temperature_2m}°C</div>
      <div class="row" style="color:${tempColour(c.apparent_temperature)}">Feels like: ${c.apparent_temperature}°C</div>
      <div class="row" style="color:${humidityColour(c.relative_humidity_2m)}">Humidity: ${c.relative_humidity_2m}%</div>
      <div class="row" style="color:${humidityColour(c.dew_point_2m)}">Dew point: ${c.dew_point_2m}°C</div>
      <div class="row" style="color:${windColour(c.wind_speed_10m)}">Wind: ${c.wind_speed_10m} km/h</div>
      <div class="row" style="color:${windColour(c.wind_gusts_10m)}">Gusts: ${c.wind_gusts_10m} km/h</div>
      <div class="row">Rain (24h): ${rain24} mm</div>
    `;
  }catch(e){
    console.error("Station failed:", id, e);
    document.getElementById(id).innerHTML = "Error loading data";
  }
}

/* ---------- COMPASS ---------- */
function initCompass(stationId){
  const st = stations[stationId];
  const windArrow = document.getElementById("wind-arrow");
  const label = document.getElementById("nearest-label");

  if(typeof st.windDir === "number"){
    windArrow.style.transform = `translate(-50%, -100%) rotate(${st.windDir}deg)`;
    label.textContent = `Wind from: ${st.name}`;
  }else{
    label.textContent = `Wind from: ${st.name} (no direction data)`;
  }

  if(window.DeviceOrientationEvent){
    function handle(event){
      let heading = event.alpha;
      if(typeof event.webkitCompassHeading === "number"){
        heading = event.webkitCompassHeading;
      }
      if(typeof heading === "number"){
        document.getElementById("device-arrow").style.transform =
          `translate(-50%, -100%) rotate(${heading}deg)`;
      }
    }
    window.addEventListener("deviceorientation", handle, true);
  }
}

/* ---------- MODAL + FLOW ---------- */
document.getElementById("continue-btn").onclick = async () => {
  const chosen = document.getElementById("station-select").value;

  document.getElementById("station-modal").style.display = "none";

  const dash = document.getElementById("dashboard");
  dash.style.display = "block";
  dash.classList.add("fade-in");

  await Promise.all(Object.keys(stations).map(loadStation));

  initCompass(chosen);
};

document.getElementById("change-station-btn").onclick = () => {
  document.getElementById("station-modal").style.display = "flex";
  document.getElementById("dashboard").style.display = "none";
};
</script>

</body>
</html>
