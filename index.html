<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QFD Bushfires + AFDRS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Leaflet for map -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0b0f;
      --bg-elevated: #111827;
      --fg: #e5e7eb;
      --fg-muted: #9ca3af;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, sans-serif;
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0.75rem;
    }

    header.app-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    .app-title {
      font-size: 1.4rem;
      font-weight: 600;
    }

    /* AFDRS widget */
    .fdr-widget {
      background: var(--bg-elevated);
      padding: 1rem;
      border-radius: 8px;
      min-width: 260px;
      max-width: 380px;
    }

    .fdr-widget-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: var(--fg-muted);
    }

    .fdr-widget-rating {
      font-size: 1.3rem;
      font-weight: 600;
    }

    .fdr-widget-fbi {
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .fdr-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
      height: 10px;
      margin: 0.75rem 0;
      border-radius: 999px;
      overflow: hidden;
    }

    .mod { background:#4caf50; }
    .high { background:#ffeb3b; }
    .ext { background:#ff9800; }
    .cat { background:#f44336; }
    .active { box-shadow: 0 0 0 2px #fff inset; }

    #map {
      width: 100%;
      height: 360px;
      border-radius: 8px;
      background: #020617;
    }

    .panel {
      background: var(--bg-elevated);
      padding: 0.75rem;
      border-radius: 8px;
      margin-top: 0.75rem;
    }

    .incident-list {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 320px;
      overflow-y: auto;
    }

    .incident-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    @media (max-width: 720px) {
      header.app-header {
        flex-direction: column;
      }
      .fdr-widget {
        width: 100%;
        max-width: 100%;
      }
      #map {
        height: 320px;
      }
    }
  </style>
</head>

<body>
<div class="app">

  <header class="app-header">
    <div class="app-title">QFD Bushfires</div>

    <div class="fdr-widget" id="fdrWidget">
      <div class="fdr-widget-title">Fire Danger Rating</div>
      <div class="fdr-widget-rating" id="fdrWidgetRating">Loading…</div>
      <div class="fdr-widget-fbi" id="fdrWidgetFbi"></div>

      <div class="fdr-bar">
        <span class="mod" id="barMod"></span>
        <span class="high" id="barHigh"></span>
        <span class="ext" id="barExt"></span>
        <span class="cat" id="barCat"></span>
      </div>

      <div id="fdrWidgetFooter" style="font-size:0.75rem;color:#9ca3af;">
        Fetching AFDRS data…
      </div>
    </div>
  </header>

  <div id="map"></div>

  <div class="panel">
    <div style="font-size:0.9rem;color:#9ca3af;text-transform:uppercase;">
      Current Bushfire Incidents
    </div>
    <ul class="incident-list" id="incidentList"></ul>
    <div id="incidentMeta" style="font-size:0.75rem;color:#9ca3af;"></div>
  </div>

</div>

<script>
/* -----------------------------
   LIVE BOM AFDRS FETCH (WORKING)
------------------------------ */

const FDR_SOURCE_URL =
  "https://www.bom.gov.au/qld/forecasts/fire-danger-ratings.shtml";

const fdrState = {
  district: "Southeast Coast",
  rating: null,
  fbi: null,
  tomorrowRating: null,
  issued: null
};

function markActiveBar(rating) {
  const map = {
    "Moderate": "barMod",
    "High": "barHigh",
    "Extreme": "barExt",
    "Catastrophic": "barCat"
  };
  Object.values(map).forEach(id =>
    document.getElementById(id).classList.remove("active")
  );
  if (map[rating]) document.getElementById(map[rating]).classList.add("active");
}

async function fetchFdr() {
  try {
    const res = await fetch(FDR_SOURCE_URL);
    const html = await res.text();

    const doc = new DOMParser().parseFromString(html, "text/html");

    const rows = [...doc.querySelectorAll("table tr")];
    const row = rows.find(r =>
      r.textContent.toLowerCase().includes("southeast coast")
    );

    if (!row) throw new Error("Row not found");

    const cells = row.querySelectorAll("td");

    fdrState.rating = cells[1]?.textContent.trim() || "Unavailable";
    fdrState.fbi = cells[2]?.textContent.trim() || "—";
    fdrState.tomorrowRating = cells[3]?.textContent.trim() || null;

    const issued = doc.querySelector("p, .issued, .timestamp");
    fdrState.issued = issued ? issued.textContent.trim() : "";

    renderFdrWidget();
  } catch (err) {
    console.error("AFDRS error:", err);
    fdrState.rating = "Unavailable";
    renderFdrWidget();
  }
}

function renderFdrWidget() {
  document.getElementById("fdrWidgetRating").textContent = fdrState.rating;
  document.getElementById("fdrWidgetFbi").textContent = `FBI ${fdrState.fbi}`;
  document.getElementById("fdrWidgetFooter").textContent =
    `${fdrState.district} • ${fdrState.issued}`;

  markActiveBar(fdrState.rating);
}

/* -----------------------------
   QFES BUSHFIRE XML FETCH
------------------------------ */

const BUSHFIRE_XML_URL =
  "https://publiccontent-gis-psba-qld-gov-au.s3.amazonaws.com/content/Feeds/BushfireCurrentIncidents/bushfireAlert.xml";

let map;
let incidentLayer;

function initMap() {
  map = L.map("map").setView([-26.65, 152.96], 8);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png")
    .addTo(map);

  incidentLayer = L.layerGroup().addTo(map);
}

async function fetchBushfires() {
  try {
    const res = await fetch(BUSHFIRE_XML_URL);
    const xml = new DOMParser().parseFromString(await res.text(), "text/xml");

    const items = [...xml.getElementsByTagName("item")];
    const incidents = items.map(item => {
      const get = tag =>
        item.getElementsByTagName(tag)[0]?.textContent.trim() || "";

      const lat = parseFloat(get("geo:lat") || get("lat"));
      const lon = parseFloat(get("geo:long") || get("long"));

      return {
        title: get("title"),
        location: get("qfes:locality"),
        region: get("qfes:region"),
        updated: get("pubDate"),
        status: get("category"),
        lat: isNaN(lat) ? null : lat,
        lon: isNaN(lon) ? null : lon
      };
    });

    renderIncidents(incidents);
  } catch (err) {
    console.error("Bushfire error:", err);
  }
}

function renderIncidents(list) {
  const ul = document.getElementById("incidentList");
  const meta = document.getElementById("incidentMeta");

  ul.innerHTML = "";
  incidentLayer.clearLayers();

  if (!list.length) {
    ul.innerHTML = "<li class='incident-item'>No current bushfires.</li>";
    meta.textContent = "Updated: " + new Date().toLocaleString();
    return;
  }

  list.forEach(inc => {
    const li = document.createElement("li");
    li.className = "incident-item";

    li.innerHTML = `
      <div style="font-weight:500;">${inc.title}</div>
      <div style="font-size:0.75rem;color:#9ca3af;">
        ${inc.location} • ${inc.region} • Updated ${inc.updated}
      </div>
      <div style="font-size:0.75rem;color:#fbbf24;">${inc.status}</div>
    `;

    ul.appendChild(li);

    if (inc.lat && inc.lon) {
      L.marker([inc.lat, inc.lon])
        .addTo(incidentLayer)
        .bindPopup(`<strong>${inc.title}</strong><br>${inc.location}`);
    }
  });

  meta.textContent =
    `Incidents: ${list.length} • Updated: ${new Date().toLocaleString()}`;

  try {
    map.fitBounds(incidentLayer.getBounds(), { padding: [20, 20] });
  } catch {}
}

/* -----------------------------
   INIT
------------------------------ */

document.addEventListener("DOMContentLoaded", () => {
  initMap();
  fetchFdr();
  fetchBushfires();

  setInterval(fetchFdr, 30 * 60 * 1000);
  setInterval(fetchBushfires, 5 * 60 * 1000);
});
</script>

</body>
</html>
