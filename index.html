<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fireground WX Data</title>

  <!-- ============================
       CSS FILES
  ============================ -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/crt.css" />
  <link rel="stylesheet" href="css/modes.css" />
  <link rel="stylesheet" href="css/lcd.css" />
  <link rel="stylesheet" href="css/tiles.css" />
  <link rel="stylesheet" href="css/maps.css" />
  <link rel="stylesheet" href="css/airfieldwx.css" />
  <link rel="stylesheet" href="css/buttons.css" />
</head>

<body>

  <!-- ============================
       MAIN MFD LAYOUT
  ============================ -->
  <div id="mfd-container">

    <!-- LEFT BUTTON STACK (MODES) -->
    <div class="button-column left-buttons">
      <button id="btn-nvg" class="mfd-button mode-btn">NVG</button>
      <button id="btn-red" class="mfd-button mode-btn">RED</button>
      <button id="btn-normal" class="mfd-button mode-btn">NORM</button>
    </div>

    <!-- CENTER CRT DISPLAY -->
    <div id="crt-frame">
      <div id="crt">

        <!-- ============================
             PAGE: WEATHER TILES
        ============================ -->
        <div id="page-wx" class="page active">
          <div id="wx-grid"></div>
        </div>

        <!-- ============================
             PAGE: RADAR
        ============================ -->
        <div id="page-radar" class="page">
          <div id="radar-map" class="map-container"></div>
        </div>

        <!-- ============================
             PAGE: SATELLITE
        ============================ -->
        <div id="page-satellite" class="page">
          <div id="satellite-map" class="map-container"></div>
        </div>

        <!-- ============================
             PAGE: COMBO OVERLAY
        ============================ -->
        <div id="page-combo" class="page">
          <div id="combo-map" class="map-container"></div>
        </div>

        <!-- ============================
             PAGE: AIRFIELD WX
        ============================ -->
        <div id="page-airfieldwx" class="page">
          <div id="airfieldwx-container"></div>
        </div>

      </div>
    </div>

    <!-- RIGHT BUTTON STACK (PAGES) -->
    <div class="button-column right-buttons">
      <button class="mfd-button page-btn" data-page="wx">WX</button>
      <button class="mfd-button page-btn" data-page="radar">RADAR</button>
      <button class="mfd-button page-btn" data-page="satellite">SAT</button>
      <button class="mfd-button page-btn" data-page="combo">COMBO</button>
      <button class="mfd-button page-btn" data-page="airfieldwx">AIRFIELD WX</button>
    </div>

  </div>

  <!-- ============================
       JAVASCRIPT FILES
  ============================ -->
  <script src="js/core.js"></script>
  <script src="js/modes.js"></script>
  <script src="js/brightness.js"></script>
  <script src="js/wx.js"></script>
  <script src="js/maps.js"></script>
  <script src="js/radar.js"></script>
  <script src="js/satellite.js"></script>
  <script src="js/combo.js"></script>
  <script src="js/airfieldwx.js"></script>

</body>
</html>
