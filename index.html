<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fireground WX Data</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/bezel.css" />
  <link rel="stylesheet" href="css/buttons.css" />
  <link rel="stylesheet" href="css/crt.css" />
  <link rel="stylesheet" href="css/layout.css" />
</head>

<body>

<div id="app-root">

  <!-- ============================
       BEZEL FRAME
  ============================= -->
  <div id="mfd-bezel">

    <!-- Screws -->
    <div class="screw screw-tl"></div>
    <div class="screw screw-tr"></div>
    <div class="screw screw-bl"></div>
    <div class="screw screw-br"></div>

    <!-- Left Buttons -->
    <div id="left-buttons" class="bezel-button-column">
      <button class="bezel-btn" data-page="wx-page">WX</button>
      <button class="bezel-btn" data-page="radar-page">RADAR</button>
      <button class="bezel-btn" data-page="satellite-page">SAT</button>
      <button class="bezel-btn" data-page="combo-page">COMBO</button>
    </div>

    <!-- Right Buttons -->
    <div id="right-buttons" class="bezel-button-column">
      <button class="bezel-btn" data-page="airfieldwx-page">AF WX</button>
      <button class="bezel-btn" data-action="mode-normal">NORM</button>
      <button class="bezel-btn" data-action="mode-nvg">NVG</button>
      <button class="bezel-btn" data-action="mode-red">RED</button>
    </div>

    <!-- ============================
         CRT + PAGE CONTAINER
    ============================= -->
    <div class="crt-glass">
      <div id="crt">
        <div id="page-container">

          <!-- WX PAGE -->
          <div id="wx-page" class="mfd-page active-page">
            <div id="wx-page-content"></div>
          </div>

          <!-- RADAR PAGE -->
          <div id="radar-page" class="mfd-page">
            <canvas id="radar-canvas"></canvas>
          </div>

          <!-- SATELLITE PAGE -->
          <div id="satellite-page" class="mfd-page">
            <canvas id="sat-canvas"></canvas>
          </div>

          <!-- COMBO PAGE -->
          <div id="combo-page" class="mfd-page">
            <canvas id="combo-canvas"></canvas>
          </div>

          <!-- AIRFIELD WX PAGE -->
          <div id="airfieldwx-page" class="mfd-page">
            <div id="airfieldwx-content"></div>
          </div>

        </div>
      </div>
    </div>

  </div>
</div>

<!-- JS -->
<script src="js/core.js"></script>
<script src="js/wx.js"></script>
<script src="js/modes.js"></script>
<script src="js/scaling.js"></script>
<script src="js/brightness.js"></script>

</body>
</html>
