<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunshine Coast Weather Stations</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #0b1020;
    color: #fff;
    padding: 20px;
  }

  h1 { margin-bottom: 1rem; }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
  }

  .card {
    background: #111628;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #222842;
    min-height: 190px;
    display: flex;
    flex-direction: column;
  }

  .name {
    font-size: 1.2rem;
    margin-bottom: 8px;
    font-weight: bold;
    display: flex;
    align-items: center;
  }

  .station-icon {
    width: 18px;
    height: 18px;
    margin-right: 8px;
    opacity: 0.9;
  }

  .row {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
  }

  .icon, .wind-arrow {
    width: 22px;
    height: 22px;
    margin-right: 8px;
  }

  .wind-arrow {
    transition: transform 0.4s ease;
  }

  .disclaimer {
    margin-top: 20px;
    font-size: 0.85rem;
    color: #aaa;
    text-align: center;
  }
</style>
</head>
<body>

<h1>Sunshine Coast Weather Stations</h1>

<div class="grid">
  <div class="card"><div class="name"><img class="station-icon" src="data:image/svg+xml;utf8,
    <svg xmlns='http://www.w3.org/2000/svg' fill='%23ff7043' viewBox='0 0 24 24'><circle cx='12' cy='12' r='10'/></svg>">Nambour</div><div id="nambour">Loading…</div></div>

  <div class="card"><div class="name"><img class="station-icon" src="data:image/svg+xml;utf8,
    <svg xmlns='http://www.w3.org/2000/svg' fill='%2344aaff' viewBox='0 0 24 24'><circle cx='12' cy='12' r='10'/></svg>">Beerburrum</div><div id="beerburrum">Loading…</div></div>

  <div class="card"><div class="name"><img class="station-icon" src="data:image/svg+xml;utf8,
    <svg xmlns='http://www.w3.org/2000/svg' fill='%2300e5ff' viewBox='0 0 24 24'><circle cx='12' cy='12' r='10'/></svg>">Sunshine Coast Airport</div><div id="sunshine">Loading…</div></div>

  <div class="card"><div class="name"><img class="station-icon" src="data:image/svg+xml;utf8,
    <svg xmlns='http://www.w3.org/2000/svg' fill='%23ffeb3b' viewBox='0 0 24 24'><circle cx='12' cy='12' r='10'/></svg>">Tewantin</div><div id="tewantin">Loading…</div></div>
</div>

<p class="disclaimer">
  ⚠️ Data sourced from Open‑Meteo — estimated model data, not official observations.
</p>

<script>
/* ---------------- ICONS (COLOURED) ---------------- */

function iconTemp() {
  return `<img class="icon" src="data:image/svg+xml;utf8,
  <svg xmlns='http://www.w3.org/2000/svg' fill='%23ff7043' viewBox='0 0 24 24'>
    <path d='M13 15.07V5a1 1 0 10-2 0v10.07a4 4 0 102 0z'/>
  </svg>">`;
}

function iconHumidity() {
  return `<img class="icon" src="data:image/svg+xml;utf8,
  <svg xmlns='http://www.w3.org/2000/svg' fill='%2344aaff' viewBox='0 0 24 24'>
    <path d='M12 2.69l5.66 5.66a8 8 0 11-11.31 0L12 2.69z'/>
  </svg>">`;
}

function iconRain() {
  return `<img class="icon" src="data:image/svg+xml;utf8,
  <svg xmlns='http://www.w3.org/2000/svg' fill='%2344aaff' viewBox='0 0 24 24'>
    <path d='M8 19a2 2 0 104 0 2 2 0 00-4 0zm4-4a2 2 0 104 0 2 2 0 00-4 0z'/>
  </svg>">`;
}

function iconWindArrow(deg) {
  return `<img class="wind-arrow" style="transform: rotate(${deg}deg)" 
    src="data:image/svg+xml;utf8,
    <svg xmlns='http://www.w3.org/2000/svg' fill='%2300e5ff' viewBox='0 0 24 24'>
      <path d='M12 2l4 8h-3v12h-2V10H8l4-8z'/>
    </svg>">`;
}

/* ---------------- COLOUR LOGIC ---------------- */

function windColour(speed) {
  if (speed < 15) return "#00e5ff";
  if (speed < 30) return "#00bcd4";
  if (speed < 45) return "#ffb74d";
  return "#ff5252";
}

function humidityColour(rh) {
  if (rh > 60) return "#44aaff";
  if (rh > 40) return "#00e5ff";
  if (rh > 20) return "#ffeb3b";
  return "#ff5252";
}

function tempColour(t) {
  if (t < 15) return "#44aaff";
  if (t < 25) return "#ffeb3b";
  if (t < 32) return "#ff9800";
  return "#ff5252";
}

/* ---------------- FETCH + RENDER ---------------- */

async function loadStation(elId, lat, lon) {

  const nowUrl = "https://api.open-meteo.com/v1/forecast?" +
    new URLSearchParams({
      latitude: lat,
      longitude: lon,
      current: "temperature_2m,apparent_temperature,dew_point_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m,wind_gusts_10m",
      timezone: "Australia/Brisbane"
    });

  const rainUrl = "https://archive-api.open-meteo.com/v1/archive?" +
    new URLSearchParams({
      latitude: lat,
      longitude: lon,
      start_date: getPastDate(1),
      end_date: getPastDate(0),
      daily: "precipitation_sum",
      timezone: "Australia/Brisbane"
    });

  try {
    const [nowRes, rainRes] = await Promise.all([fetch(nowUrl), fetch(rainUrl)]);
    const now = await nowRes.json();
    const rain = await rainRes.json();

    const c = now.current;
    const rain24 = rain.daily.precipitation_sum[0];

    document.getElementById(elId).innerHTML = `
      <div class="row">${iconTemp()}
        <span style="color:${tempColour(c.temperature_2m)}">
          ${c.temperature_2m}°C
        </span>
      </div>

      <div class="row">${iconTemp()}
        <span style="color:${tempColour(c.apparent_temperature)}">
          Feels like: ${c.apparent_temperature}°C
        </span>
      </div>

      <div class="row">${iconHumidity()}
        <span style="color:${humidityColour(c.relative_humidity_2m)}">
          ${c.relative_humidity_2m}%
        </span>
      </div>

      <div class="row">${iconHumidity()}
        <span style="color:${humidityColour(c.dew_point_2m)}">
          Dew point: ${c.dew_point_2m}°C
        </span>
      </div>

      <div class="row">${iconWindArrow(c.wind_direction_10m)}
        <span style="color:${windColour(c.wind_speed_10m)}">
          ${c.wind_speed_10m} km/h
        </span>
      </div>

      <div class="row">${iconWindArrow(c.wind_direction_10m)}
        <span style="color:${windColour(c.wind_gusts_10m)}">
          Gusts: ${c.wind_gusts_10m} km/h
        </span>
      </div>

      <div class="row">${iconRain()} Rain (24h): ${rain24} mm</div>
    `;
  } catch (err) {
    document.getElementById(elId).textContent = "Error loading data";
    console.error(err);
  }
}

function getPastDate(days) {
  const d = new Date();
  d.setDate(d.getDate() - days);
  return d.toISOString().split("T")[0];
}

/* ---------------- STATION COORDINATES ---------------- */

loadStation("nambour",    -26.63, 152.96);
loadStation("beerburrum", -26.95, 153.06);
loadStation("sunshine",   -26.60, 153.09);
loadStation("tewantin",   -26.39, 153.03);
</script>

</body>
</html>
