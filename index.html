<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FDR — Southeast Coast</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  :root {
    --bg: #111;
    --card: #1b1b1b;
    --text: #f5f5f5;
    --muted: #999;

    /* FDR colours */
    --low: #2e7d32;
    --moderate: #0277bd;
    --high: #fbc02d;
    --extreme: #d32f2f;
    --catastrophic: #000;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: var(--card);
    padding: 24px;
    border-radius: 12px;
    width: 90%;
    max-width: 420px;
    text-align: center;
    border: 1px solid #333;
  }

  .district {
    font-size: 18px;
    margin-bottom: 12px;
    color: var(--muted);
  }

  .fdr {
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 8px;
  }

  .fbi {
    font-size: 16px;
    margin-bottom: 6px;
  }

  .issued {
    font-size: 12px;
    color: var(--muted);
  }

  .bar {
    height: 6px;
    width: 100%;
    border-radius: 4px;
    margin-bottom: 18px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="district">Southeast Coast</div>
  <div class="bar" id="bar"></div>
  <div class="fdr" id="fdr">Loading…</div>
  <div class="fbi" id="fbi">FBI —</div>
  <div class="issued" id="issued">—</div>
</div>

<script>
async function loadFDR() {
  try {
    const res = await fetch("https://www.bom.gov.au/feeds/idq13016.xml");
    const xml = await res.text();
    const doc = new DOMParser().parseFromString(xml, "application/xml");

    const districts = [...doc.querySelectorAll("district")];
    const se = districts.find(d =>
      d.querySelector("name")?.textContent.trim().toLowerCase() === "southeast coast"
    );

    const rating = se?.querySelector("rating_today")?.textContent.trim() || "Unavailable";
    const fbi = se?.querySelector("fbi_today")?.textContent.trim() || "—";
    const issued = doc.querySelector("issue-time-local")?.textContent.trim() || "—";

    document.getElementById("fdr").textContent = rating;
    document.getElementById("fbi").textContent = "FBI " + fbi;
    document.getElementById("issued").textContent = issued;

    const bar = document.getElementById("bar");
    const r = rating.toLowerCase();

    if (r.includes("low")) bar.style.background = "var(--low)";
    else if (r.includes("moderate")) bar.style.background = "var(--moderate)";
    else if (r.includes("high")) bar.style.background = "var(--high)";
    else if (r.includes("extreme")) bar.style.background = "var(--extreme)";
    else if (r.includes("catastrophic")) bar.style.background = "var(--catastrophic)";
    else bar.style.background = "#444";

  } catch (err) {
    document.getElementById("fdr").textContent = "Unavailable";
    document.getElementById("fbi").textContent = "FBI —";
    document.getElementById("issued").textContent = "Data unavailable";
    document.getElementById("bar").style.background = "#444";
  }
}

loadFDR();
setInterval(loadFDR, 60000); // auto-refresh every 60s
</script>

</body>
</html>
