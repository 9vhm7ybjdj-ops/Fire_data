<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunshine Coast Weather</title>

<style>
  :root {
    --bg: #0d0d0d;
    --tile-bg: #1a1a1a;
    --text: #e5e5e5;
    --muted: #9ca3af;
    --blue: #4cc3ff;
    --radius: 14px;
    --shadow: 0 2px 6px rgba(0,0,0,0.4);
  }

  body {
    margin: 0;
    padding: 16px;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, sans-serif;
  }

  h1 {
    margin: 0 0 14px;
    font-size: 1.5rem;
    font-weight: 600;
  }

  .grid {
    display: grid;
    gap: 16px;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  }

  .station-tile {
    background: var(--tile-bg);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
  }

  .station-name {
    font-size: 1.2rem;
    font-weight: 600;
  }

  .station-time {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .wx-row {
    display: grid;
    grid-template-columns: 1.8rem 7.5rem auto auto;
    align-items: center;
    font-size: 0.92rem;
    margin: 4px 0;
  }

  /* Glowing blue arrow */
  .wind-arrow {
    width: 26px;
    height: 26px;
    transform-origin: 50% 15%; /* FIXED pivot */
    display: inline-block;
  }
</style>
</head>

<body>
<h1>Sunshine Coast Weather</h1>

<div class="grid">
