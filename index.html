<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QFD Bushfires + AFDRS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Leaflet for map -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0b0f;
      --bg-elevated: #111827;
      --fg: #e5e7eb;
      --fg-muted: #9ca3af;
      --accent: #f97316;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background: var(--bg);
      color: var(--fg);
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0.75rem 0.75rem 1.5rem;
    }

    header.app-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    .app-title-block {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .app-title {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .app-subtitle {
      font-size: 0.8rem;
      color: var(--fg-muted);
    }

    /* AFDRS widget (Option B) */
    .fdr-widget {
      border-radius: 8px;
      padding: 0.9rem 1rem;
      background: var(--bg-elevated);
      color: #f9fafb;
      min-width: 260px;
      max-width: 380px;
      flex-shrink: 0;
    }

    .fdr-widget-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.5rem;
    }

    .fdr-widget-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--fg-muted);
    }

    .fdr-widget-rating {
      font-size: 1.3rem;
      font-weight: 600;
    }

    .fdr-widget-fbi {
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .fdr-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
      margin: 0.75rem 0;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
    }

    .fdr-bar span {
      display: block;
    }

    .fdr-bar .mod {
      background: #4caf50;
    }

    .fdr-bar .high {
      background: #ffeb3b;
    }

    .fdr-bar .ext {
      background: #ff9800;
    }

    .fdr-bar .cat {
      background: #f44336;
    }

    .fdr-bar span.active {
      box-shadow: 0 0 0 2px #f9fafb inset;
    }

    .fdr-widget-footer {
      font-size: 0.75rem;
      color: var(--fg-muted);
    }

    .fdr-error {
      font-size: 0.75rem;
      color: #fca5a5;
      margin-top: 0.25rem;
    }

    /* Layout below header */
    .main-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr);
      gap: 0.75rem;
    }

    #map {
      width: 100%;
      height: 360px;
      border-radius: 8px;
      overflow: hidden;
      background: #020617;
    }

    .panel {
      background: var(--bg-elevated);
      border-radius: 8px;
      padding: 0.75rem 0.9rem;
    }

    .panel-title {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--fg-muted);
      margin-bottom: 0.4rem;
    }

    .incident-list {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 320px;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    .incident-item {
      padding: 0.45rem 0;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
    }

    .incident-item:last-child {
      border-bottom: none;
    }

    .incident-title {
      font-size: 0.9rem;
      font-weight: 500;
    }

    .incident-meta {
      font-size: 0.75rem;
      color: var(--fg-muted);
      margin-top: 0.1rem;
    }

    .incident-status {
      font-size: 0.75rem;
      color: #fbbf24;
    }

    .small {
      font-size: 0.75rem;
      color: var(--fg-muted);
    }

    @media (max-width: 720px) {
      header.app-header {
        flex-direction: column;
        align-items: stretch;
      }

      .fdr-widget {
        width: 100%;
        max-width: 100%;
      }

      #map {
        height: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="app-title-block">
        <div class="app-title">QFD Bushfires</div>
        <div class="app-subtitle">
          Live bushfire incidents &amp; Fire Danger Rating — Southeast Coast
        </div>
      </div>

      <div class="fdr-widget" id="fdrWidget">
        <div class="fdr-widget-header">
          <div>
            <div class="fdr-widget-title">Fire Danger Rating</div>
            <div class="fdr-widget-rating" id="fdrWidgetRating">
              Loading…
            </div>
          </div>
          <div class="fdr-widget-fbi" id="fdrWidgetFbi"></div>
        </div>

        <div class="fdr-bar">
          <span class="mod" id="barMod"></span>
          <span class="high" id="barHigh"></span>
          <span class="ext" id="barExt"></span>
          <span class="cat" id="barCat"></span>
        </div>

        <div class="fdr-widget-footer" id="fdrWidgetFooter">
          Fetching AFDRS data…
        </div>
        <div class="fdr-error" id="fdrError" style="display:none;"></div>
      </div>
    </header>

    <div class="main-layout">
      <div>
        <div id="map"></div>

        <div class="panel" style="margin-top:0.75rem;">
          <div class="panel-title">Current Bushfire Incidents</div>
          <ul class="incident-list" id="incidentList"></ul>
          <div class="small" id="incidentMeta"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const FDR_SOURCE_URL =
      "https://www.bom.gov.au/cgi-bin/wrap_fwo.pl?IDQ13016.html";
    const BUSHFIRE_XML_URL =
      "https://publiccontent-gis-psba-qld-gov-au.s3.amazonaws.com/content/Feeds/BushfireCurrentIncidents/bushfireAlert.xml";

    const fdrState = {
      district: "Southeast Coast",
      rating: null,
      fbi: null,
      today: null,
      tomorrowRating: null,
      issued: null,
    };

    let map;
    let incidentLayer;

    function markActiveBar(rating) {
      const ids = ["barMod", "barHigh", "barExt", "barCat"];
      ids.forEach((id) =>
        document.getElementById(id).classList.remove("active")
      );
      const mapRating = {
        Moderate: "barMod",
        High: "barHigh",
        Extreme: "barExt",
        Catastrophic: "barCat",
      };
      const target = mapRating[rating];
      if (target) {
        document.getElementById(target).classList.add("active");
      }
    }

    function renderFdrWidget() {
      const ratingEl = document.getElementById("fdrWidgetRating");
      const fbiEl = document.getElementById("fdrWidgetFbi");
      const footerEl = document.getElementById("fdrWidgetFooter");
      const errEl = document.getElementById("fdrError");

      if (!fdrState.rating) {
        ratingEl.textContent = "Unavailable";
        fbiEl.textContent = "";
        footerEl.textContent = "AFDRS data not available.";
        errEl.style.display = "block";
        errEl.textContent =
          "Could not read Fire Danger Rating for Southeast Coast.";
        return;
      }

      ratingEl.textContent = fdrState.rating;
      fbiEl.textContent = fdrState.fbi
        ? `FBI ${fdrState.fbi}`
        : "FBI not available";

      const parts = [];
      parts.push(fdrState.district);
      if (fdrState.today) parts.push(`Today ${fdrState.today}`);
      if (fdrState.issued) parts.push(`Issued ${fdrState.issued}`);
      footerEl.textContent = parts.join(" • ");

      errEl.style.display = "none";
      errEl.textContent = "";

      markActiveBar(fdrState.rating);
    }

    async function fetchFdr() {
      try {
        const res = await fetch(FDR_SOURCE_URL, { mode: "cors" });
        const text = await res.text();

        const parser = new DOMParser();
        const doc = parser.parseFromString(text, "text/html");

        const rows = Array.from(doc.querySelectorAll("table tr"));
        const targetRow = rows.find((tr) => {
          const tds = tr.querySelectorAll("td");
          if (!tds.length) return false;
          return (
            tds[0].textContent &&
            tds[0].textContent.toLowerCase().includes("southeast coast")
          );
        });

        if (!targetRow) {
          renderFdrWidget();
          return;
        }

        const cells = targetRow.querySelectorAll("td");
        const district = cells[0]?.textContent.trim() || "Southeast Coast";
        const todayRating = cells[1]?.textContent.trim() || null;
        const todayFbi = cells[2]?.textContent.trim() || null;
        const tomorrowRating = cells[3]?.textContent.trim() || null;

        const issuedEl = doc.querySelector("p, .issued, .timestamp");
        const issuedText = issuedEl
          ? issuedEl.textContent.trim()
          : "";

        fdrState.district = district;
        fdrState.rating = todayRating;
        fdrState.fbi = todayFbi;
        fdrState.tomorrowRating = tomorrowRating;
        fdrState.today = new Date().toISOString().slice(0, 10);
        fdrState.issued = issuedText;

        renderFdrWidget();
      } catch (e) {
        console.error("FDR fetch error", e);
        renderFdrWidget();
      }
    }

    function initMap() {
      map = L.map("map", {
        center: [-26.65, 152.96],
        zoom: 8,
        zoomControl: true,
      });

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 18,
        attribution: "&copy; OpenStreetMap contributors",
      }).addTo(map);

      incidentLayer = L.layerGroup().addTo(map);
    }

    function renderIncidents(incidents) {
      const listEl = document.getElementById("incidentList");
      const metaEl = document.getElementById("incidentMeta");
      listEl.innerHTML = "";
      incidentLayer.clearLayers();

      if (!incidents.length) {
        const li = document.createElement("li");
        li.className = "incident-item";
        li.textContent = "No current bushfire incidents in this feed.";
        listEl.appendChild(li);
        metaEl.textContent = "Updated: " + new Date().toLocaleString();
        return;
      }

      incidents.forEach((inc) => {
        const li = document.createElement("li");
        li.className = "incident-item";

        const title = document.createElement("div");
        title.className = "incident-title";
        title.textContent = inc.title || "Bushfire Incident";

        const meta = document.createElement("div");
        meta.className = "incident-meta";
        meta.textContent = [
          inc.location,
          inc.region,
          inc.updated && `Updated ${inc.updated}`,
        ]
          .filter(Boolean)
          .join(" • ");

        const status = document.createElement("div");
        status.className = "incident-status";
        status.textContent = inc.status || "";

        li.appendChild(title);
        if (meta.textContent) li.appendChild(meta);
        if (status.textContent) li.appendChild(status);
        listEl.appendChild(li);

        if (inc.lat && inc.lon) {
          const marker = L.marker([inc.lat, inc.lon]).addTo(incidentLayer);
          marker.bindPopup(
            `<strong>${title.textContent}</strong><br>${meta.textContent}`
          );
        }
      });

      metaEl.textContent =
        "Incidents: " +
        incidents.length +
        " • Updated: " +
        new Date().toLocaleString();

      try {
        incidentLayer.getBounds().isValid() &&
          map.fitBounds(incidentLayer.getBounds(), { padding: [20, 20] });
      } catch (_) {}
    }

    async function fetchBushfires() {
      try {
        const res = await fetch(BUSHFIRE_XML_URL);
        const text = await res.text();
        const parser = new DOMParser();
        const xml = parser.parseFromString(text, "application/xml");

        const items = Array.from(xml.getElementsByTagName("item"));
        const incidents = items.map((item) => {
          const get = (tag) =>
            item.getElementsByTagName(tag)[0]?.textContent.trim() || "";
          const lat = parseFloat(get("geo:lat") || get("lat"));
          const lon = parseFloat(get("geo:long") || get("long"));
          return {
            title: get("title"),
            description: get("description"),
            status: get("category"),
            location: get("qfes:locality") || "",
            region: get("qfes:region") || "",
            updated: get("pubDate"),
            lat: isNaN(lat) ? null : lat,
            lon: isNaN(lon) ? null : lon,
          };
        });

        renderIncidents(incidents);
      } catch (e) {
        console.error("Bushfire fetch error", e);
        renderIncidents([]);
      }
    }

    function init() {
      initMap();
      fetchFdr();
      fetchBushfires();

      setInterval(fetchFdr, 30 * 60 * 1000);
      setInterval(fetchBushfires, 5 * 60 * 1000);
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
