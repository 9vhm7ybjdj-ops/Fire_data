<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunshine Coast Weather</title>

<style>
  :root {
    --bg: #0b0b0b;              /* tactical black */
    --tile-bg: #141414;         /* equipment panel */
    --tile-edge: #1f1f1f;       /* subtle bevel */
    --text: #e6e6e6;            /* high contrast */
    --muted: #7a7a7a;           /* dim labels */
    --accent: #4cc3ff;          /* neon cyan (wind) */
    --radius: 6px;              /* harder edges */
    --shadow: 0 0 0 2px #0f0f0f inset; /* industrial inset */
  }

  body {
    margin: 0;
    padding: 16px;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, sans-serif;
    letter-spacing: 0.3px;
  }

  h1 {
    margin: 0 0 14px;
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
  }

  .grid {
    display: grid;
    gap: 18px;
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: 1fr;
  }

  .station-tile {
    background: var(--tile-bg);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--shadow);
    border: 1px solid var(--tile-edge);
    position: relative;
  }

  .station-tile::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(145deg, #1a1a1a 0%, #0d0d0d 100%);
    opacity: 0.15;
    pointer-events: none;
  }

  .station-name {
    font-size: 1.1rem;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--accent);
  }

  .station-time {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .wx-row {
    display: grid;
    grid-template-columns: 1.6rem 7rem auto auto;
    align-items: center;
    font-size: 0.9rem;
    margin: 6px 0;
    font-family: "Consolas", monospace;
  }

  .wind-arrow {
    width: 28px;
    height: 28px;
    transform-origin: 50% 85%;
    display: inline-block;
  }
</style>
</head>

<body>
<h1>Sunshine Coast Weather</h1>

<div class="grid">
<!-- Nambour -->
<div class="station-tile" id="station-nambour">
  <div class="station-name">Nambour</div>
  <div class="station-time" data-role="time">Loading…</div>

  <div class="wx-row">
    <span>🌡️</span><span>Temperature:</span><span data-role="temp">–</span>
  </div>

  <div class="wx-row">
    <span>
      <svg class="wind-arrow" viewBox="0 0 100 100">
        <defs>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <polygon points="50,10 60,40 50,35 40,40" fill="#4cc3ff" filter="url(#glow)"/>
        <rect x="47" y="40" width="6" height="45" fill="#4cc3ff" filter="url(#glow)"/>
      </svg>
    </span>
    <span>Wind:</span>
    <span data-role="wind-speed">–</span>
    <span data-role="wind-dir">–</span>
  </div>

  <div class="wx-row">
    <span>💨</span>
    <span>Gust:</span>
    <span data-role="gust-speed">–</span>
    <span></span>
  </div>

  <div class="wx-row"><span>💧</span><span>Humidity:</span><span data-role="humidity">–</span></div>
  <div class="wx-row"><span>🌧️</span><span>Rainfall:</span><span data-role="rain">–</span></div>
  <div class="wx-row"><span>❄️</span><span>Dew Point:</span><span data-role="dewpoint">–</span></div>

  <div class="loading" data-role="status">Loading data…</div>
</div>

<!-- Repeat the same structure for Beerburrum, SCA, Tewantin -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  const stations = [
    { id: "nambour", name: "Nambour", lat: -26.63, lon: 152.96 },
    { id: "beerburrum", name: "Beerburrum", lat: -26.95, lon: 152.95 },
    { id: "sca", name: "Sunshine Coast Airport", lat: -26.60, lon: 153.09 },
    { id: "tewantin", name: "Tewantin", lat: -26.39, lon: 153.03 }
  ];

  function degToCompass(deg) {
    const dirs = ["N","NE","E","SE","S","SW","W","NW"];
    return dirs[Math.round(deg / 45) % 8];
  }

  function formatTime(d) {
    return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
  }

  async function loadStation(st) {
    const el = document.getElementById(`station-${st.id}`);

    const timeEl = el.querySelector('[data-role="time"]');
    const statusEl = el.querySelector('[data-role="status"]');

    const tempEl = el.querySelector('[data-role="temp"]');
    const humEl = el.querySelector('[data-role="humidity"]');
    const rainEl = el.querySelector('[data-role="rain"]');
    const dewEl = el.querySelector('[data-role="dewpoint"]');

    const windSpeedEl = el.querySelector('[data-role="wind-speed"]');
    const windDirEl = el.querySelector('[data-role="wind-dir"]');
    const gustSpeedEl = el.querySelector('[data-role="gust-speed"]');

    const windArrowEl = el.querySelector('.wind-arrow');

    try {
      const url =
        `https://api.open-meteo.com/v1/forecast?latitude=${st.lat}&longitude=${st.lon}` +
        `&current=temperature_2m,relative_humidity_2m,dew_point_2m,precipitation,` +
        `wind_speed_10m,wind_gusts_10m,wind_direction_10m&timezone=auto`;

      const res = await fetch(url);
      const data = await res.json();
      const c = data.current;

      tempEl.textContent = `${c.temperature_2m.toFixed(1)}°C`;
      humEl.textContent = `${c.relative_humidity_2m}%`;
      dewEl.textContent = `${c.dew_point_2m.toFixed(1)}°C`;
      rainEl.textContent = `${c.precipitation.toFixed(1)} mm`;

      windSpeedEl.textContent = `${c.wind_speed_10m.toFixed(1)} km/h`;
      gustSpeedEl.textContent = `${c.wind_gusts_10m.toFixed(1)} km/h`;

      windDirEl.textContent = `${degToCompass(c.wind_direction_10m)} (${c.wind_direction_10m}°)`;

      windArrowEl.style.transform = `rotate(${c.wind_direction_10m}deg)`;

      timeEl.textContent = `Updated: ${formatTime(new Date())}`;
      statusEl.textContent = "";

    } catch (err) {
      statusEl.textContent = "Error loading data";
      statusEl.style.color = "#ff4d4d";
    }
  }

  stations.forEach(loadStation);

});
</script>
</body>
</html>
