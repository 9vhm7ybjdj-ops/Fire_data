<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FDR — South East Coast</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  :root {
    --bg: #111;
    --card: #1b1b1b;
    --text: #f5f5f5;
    --muted: #999;

    /* AFDRS colours */
    --no-rating: #ffffff;
    --moderate: #0277bd;
    --high: #fbc02d;
    --extreme: #d32f2f;
    --catastrophic: #000000;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: var(--card);
    padding: 24px;
    border-radius: 12px;
    width: 90%;
    max-width: 420px;
    text-align: center;
    border: 1px solid #333;
  }

  .district {
    font-size: 18px;
    margin-bottom: 12px;
    color: var(--muted);
  }

  .fdr {
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 8px;
  }

  .fbi {
    font-size: 16px;
    margin-bottom: 6px;
  }

  .issued {
    font-size: 12px;
    color: var(--muted);
  }

  .bar {
    height: 6px;
    width: 100%;
    border-radius: 4px;
    margin-bottom: 18px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="district">South East Coast</div>
  <div class="bar" id="bar"></div>
  <div class="fdr" id="fdr">Loading…</div>
  <div class="fbi" id="fbi">FBI —</div>
  <div class="issued" id="issued">—</div>
</div>

<script>
async function loadFDR() {
  try {
    const url =
      "https://services1.arcgis.com/0p6i4Jp2i0qN5Q5x/ArcGIS/rest/services/AFDRS_Ratings_Public/FeatureServer/0/query?where=1%3D1&outFields=*&f=json";

    const res = await fetch(url);
    const data = await res.json();

    // Correct field name + correct spelling
    const se = data.features.find(
      f => f.attributes.district_name.toLowerCase() === "south east coast"
    );

    if (!se) throw new Error("District not found");

    // Correct field names
    const rating = se.attributes.rating_text || "No Rating";
    const fbi = se.attributes.fbi_value ?? "—";
    const issued = new Date(se.attributes.issue_time).toLocaleString();

    document.getElementById("fdr").textContent = rating;
    document.getElementById("fbi").textContent = "FBI " + fbi;
    document.getElementById("issued").textContent = issued;

    const bar = document.getElementById("bar");
    const r = rating.toLowerCase();

    if (r.includes("no")) bar.style.background = "var(--no-rating)";
    else if (r.includes("moderate")) bar.style.background = "var(--moderate)";
    else if (r.includes("high")) bar.style.background = "var(--high)";
    else if (r.includes("extreme")) bar.style.background = "var(--extreme)";
    else if (r.includes("catastrophic")) bar.style.background = "var(--catastrophic)";
    else bar.style.background = "#444";

  } catch (err) {
    document.getElementById("fdr").textContent = "Unavailable";
    document.getElementById("fbi").textContent = "FBI —";
    document.getElementById("issued").textContent = "Data unavailable";
    document.getElementById("bar").style.background = "#444";
  }
}

loadFDR();
setInterval(loadFDR, 60000);
</script>

</body>
</html>
