<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nambour & Beerburrum Observations</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #111;
    color: #eee;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  h1 { margin: 0; font-size: 1.4rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 720px;
  }
  .card {
    background: #1b1b1b;
    padding: 16px;
    border-radius: 10px;
    box-shadow: 0 0 0 1px #333;
  }
  .card h2 { margin: 0 0 8px; font-size: 1.1rem; }
  .obs-time { font-size: 0.8rem; color: #aaa; margin-bottom: 8px; }
  .row { display: flex; justify-content: space-between; padding: 4px 0; }
  .label { color: #ccc; display: flex; gap: 6px; align-items: center; }
  .value { font-weight: 500; }
  .error { color: #ff8080; margin-top: 8px; font-size: 0.9rem; }
</style>
</head>
<body>

<h1>Nambour & Beerburrum – Current BOM Observations</h1>

<div class="grid">
  <div class="card" id="nambour-card">
    <h2>Nambour</h2>
    <div class="obs-time" id="nambour-time">Loading…</div>

    <div class="row"><span class="label">🌡️ Temperature</span><span class="value" id="nambour-temp">–</span></div>
    <div class="row"><span class="label">🌡️ Dew point</span><span class="value" id="nambour-dew">–</span></div>
    <div class="row"><span class="label">💧 Humidity</span><span class="value" id="nambour-rh">–</span></div>
    <div class="row"><span class="label">🌬️ Wind dir</span><span class="value" id="nambour-wdir">–</span></div>
    <div class="row"><span class="label">🌬️ Wind speed</span><span class="value" id="nambour-wspd">–</span></div>
    <div class="row"><span class="label">💨 Gust</span><span class="value" id="nambour-gust">–</span></div>
    <div class="row"><span class="label">🌧️ Rain 9am</span><span class="value" id="nambour-rain">–</span></div>

    <div class="error" id="nambour-error"></div>
  </div>

  <div class="card" id="beerburrum-card">
    <h2>Beerburrum</h2>
    <div class="obs-time" id="beerburrum-time">Loading…</div>

    <div class="row"><span class="label">🌡️ Temperature</span><span class="value" id="beerburrum-temp">–</span></div>
    <div class="row"><span class="label">🌡️ Dew point</span><span class="value" id="beerburrum-dew">–</span></div>
    <div class="row"><span class="label">💧 Humidity</span><span class="value" id="beerburrum-rh">–</span></div>
    <div class="row"><span class="label">🌬️ Wind dir</span><span class="value" id="beerburrum-wdir">–</span></div>
    <div class="row"><span class="label">🌬️ Wind speed</span><span class="value" id="beerburrum-wspd">–</span></div>
    <div class="row"><span class="label">💨 Gust</span><span class="value" id="beerburrum-gust">–</span></div>
    <div class="row"><span class="label">🌧️ Rain 9am</span><span class="value" id="beerburrum-rain">–</span></div>

    <div class="error" id="beerburrum-error"></div>
  </div>
</div>

<script>
const BOM_URL = "https://reg.bom.gov.au/fwo/IDQ60920.xml";

const STATIONS = {
  nambour: "NAMBOUR",
  beerburrum: "BEERBURRUM"
};

let lastTemp = { nambour: null, beerburrum: null };

function colour(value, thresholds) {
  if (value === "–" || value === null) return "#eee";
  const v = Number(value);
  if (v <= thresholds.green) return "#6f6";
  if (v <= thresholds.yellow) return "#ff6";
  return "#f66";
}

function trendArrow(prefix, newTemp) {
  const old = lastTemp[prefix];
  lastTemp[prefix] = newTemp;

  if (old === null || newTemp === "–") return "";

  const diff = newTemp - old;
  if (diff > 0.2) return " ▲";
  if (diff < -0.2) return " ▼";
  return " →";
}

function getVal(node, type) {
  const el = node.querySelector(`element[type="${type}"]`);
  return el ? el.getAttribute("value") : "–";
}

function getTime(node) {
  const p = node.querySelector("period");
  return p ? (p.getAttribute("time-local") || p.getAttribute("time-utc")) : "–";
}

function update(prefix, node) {
  if (!node) {
    document.getElementById(prefix + "-error").textContent = "No data available.";
    return;
  }

  const temp = getVal(node, "air_temperature");
  const dew = getVal(node, "dew_point");
  const rh = getVal(node, "relative_humidity");
  const wdir = getVal(node, "wind_direction");
  const wspd = getVal(node, "wind_speed_kmh");
  const gust = getVal(node, "gust_kmh");
  const rain = getVal(node, "rainfall_since_9am");

  const arrow = trendArrow(prefix, temp === "–" ? null : Number(temp));

  document.getElementById(prefix + "-temp").textContent = temp + arrow;
  document.getElementById(prefix + "-dew").textContent = dew;
  document.getElementById(prefix + "-rh").textContent = rh;
  document.getElementById(prefix + "-wdir").textContent = wdir;
  document.getElementById(prefix + "-wspd").textContent = wspd;
  document.getElementById(prefix + "-gust").textContent = gust;
  document.getElementById(prefix + "-rain").textContent = rain;
  document.getElementById(prefix + "-time").textContent = "Obs time: " + getTime(node);

  // Apply colour coding
  document.getElementById(prefix + "-rh").style.color =
    colour(rh, { green: 70, yellow: 40 });

  document.getElementById(prefix + "-wspd").style.color =
    colour(wspd, { green: 10, yellow: 25 });

  document.getElementById(prefix + "-gust").style.color =
    colour(gust, { green: 20, yellow: 40 });
}

async function load() {
  try {
    const res = await fetch(BOM_URL);
    const xml = new DOMParser().parseFromString(await res.text(), "application/xml");
    const stations = [...xml.querySelectorAll("station")];

    const nNode = stations.find(s => s.getAttribute("stn-name")?.toUpperCase().includes(STATIONS.nambour));
    const bNode = stations.find(s => s.getAttribute("stn-name")?.toUpperCase().includes(STATIONS.beerburrum));

    update("nambour", nNode);
    update("beerburrum", bNode);

  } catch (e) {
    document.getElementById("nambour-error").textContent = "Error loading data.";
    document.getElementById("beerburrum-error").textContent = "Error loading data.";
  }
}

load();
setInterval(load, 10 * 60 * 1000);
</script>

</body>
</html>
