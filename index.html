<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fireground WX Data</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/bezel.css" />
  <link rel="stylesheet" href="css/crt.css" />
  <link rel="stylesheet" href="css/lcd.css" />
  <link rel="stylesheet" href="css/buttons.css" />
  <link rel="stylesheet" href="css/tiles.css" />
  <link rel="stylesheet" href="css/airfieldwx.css" />
  <link rel="stylesheet" href="css/modes.css" />

  <!-- JS -->
  <script src="js/core.js" defer></script>
  <script src="js/modes.js" defer></script>
  <script src="js/brightness.js" defer></script>
  <script src="js/scaling.js" defer></script>
  <script src="js/wx.js" defer></script>
  <script src="js/airfieldwx.js" defer></script>
  <script src="js/radar.js" defer></script>
  <script src="js/satellite.js" defer></script>
  <script src="js/combo.js" defer></script>
</head>

<body>
  <div id="app-root">
    <div id="mfd-bezel">

      <!-- SCREWS -->
      <div id="screw-tl" class="bezel-screw"><div class="bezel-screw-mark"></div></div>
      <div id="screw-tr" class="bezel-screw"><div class="bezel-screw-mark"></div></div>
      <div id="screw-bl" class="bezel-screw"><div class="bezel-screw-mark"></div></div>
      <div id="screw-br" class="bezel-screw"><div class="bezel-screw-mark"></div></div>

      <!-- LEFT BUTTON STACK -->
      <div id="left-buttons">
        <button class="bezel-btn" data-page="wx-page">WX</button>
        <button class="bezel-btn" data-page="radar-page">RADAR</button>
        <button class="bezel-btn" data-page="satellite-page">SAT</button>
        <button class="bezel-btn" data-page="combo-page">COMBO</button>
        <button class="bezel-btn" data-page="airfieldwx-page">AF WX</button>
      </div>

      <!-- CENTER CRT -->
      <div id="mfd-screen">
        <div id="crt" class="normal-mode">
          <div class="crt-glass"></div>
          <div class="crt-bloom"></div>

          <div id="page-container">

            <!-- WX PAGE -->
            <div id="wx-page" class="mfd-page active-page">
              <div class="page-header">
                <div class="page-title">Local WX</div>
                <div id="wx-last-update" class="page-subtitle">Last update: --:--</div>
              </div>

              <div id="wx-grid">
                <!-- Nambour -->
                <div class="wx-tile">
                  <div class="tile-header">Nambour</div>
                  <div class="tile-body">
                    <div class="tile-row"><span class="tile-label">Temp</span><span id="nambour-temp" class="tile-value">--</span></div>
                    <div class="tile-row"><span class="tile-label">Dew Pt</span><span id="nambour-dew" class="tile-value">--</span></div>
                    <div class="tile-row"><span class="tile-label">Wind</span><span id="nambour-wind" class="tile-value">--</span></div>
                    <div class="tile-row"><span class="tile-label">Gust</span><span id="nambour-gust" class="tile-value">--</span></div>
                    <div class="tile-row"><span class="tile-label">RH</span><span id="nambour-rh" class="tile-value">--</span></div>
                    <div class="tile-row"><span class="tile-label">Rain</span><span id="nambour-rain" class="tile-value">--</span></div>
                  </div>
                </div>

                <!-- Beerburrum -->
                <div class="wx-tile">
                  <div class="tile-header">Beerburrum</div>
                  <div class="tile-body">
                    <div class="tile-row"><span class="tile-label">Temp</span><span id="beerburrum-temp" class="tile-value">--</span></div>
                    <div class="tile-row"><span class="tile-label">Dew Pt</span><span id="beerburrum-dew" class="tile-value">--</span></div>
                    <div class="tile-row"><span class="tile-label">Wind</span><span id="beerburrum-wind" class="tile-value">--</span></div>
                    <div class="tile-row"><span class="tile-label">Gust</span><span id="beerburrum-gust" class="tile-value">--</span></div>
                    <div class="tile-row"><span class="tile-label">RH</span><span id="beerburrum-rh" class="tile-value">--</span></div>
                    <div class="tile-row"><span class="tile-label">Rain</span><span id="beerburrum-rain" class="tile-value">--</span></div>
                  </div>
                </div>

                <!-- Tewantin -->
                <div class="wx-tile">
                  <div class="tile-header">Tewantin</div>
                  <div class="tile-body">
                    <div class="tile-row"><span class="tile-label">Temp</span><span id="tewantin-temp" class="tile-value">--</span></div>
                    <div class="tile-row"><span class="tile-label">Dew Pt</span><span id="tewantin-dew" class="tile-value">--</span></div>
                    <div class="tile-row"><span class="tile-label">Wind</span><span id="tewantin-wind" class="tile-value">--</span></div>
                    <div class="tile-row"><span class="tile-label">Gust</span><span id="tewantin-gust" class="tile-value">--</span></div>
                    <div class="tile-row"><span class="tile-label">RH</span><span id="tewantin-rh" class="tile-value">--</span></div>
                    <div class="tile-row"><span class="tile-label">Rain</span><span id="tewantin-rain" class="tile-value">--</span></div>
                  </div>
                </div>

                <!-- Sunshine Coast Airport -->
                <div class="wx-tile">
                  <div class="tile-header">Sunshine Coast Apt</div>
                  <div class="tile-body">
                    <div class="tile-row"><span class="tile-label">Temp</span><span id="apt-temp" class="tile-value">--</span></div>
                    <div class="tile-row"><
