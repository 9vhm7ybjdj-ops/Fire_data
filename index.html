<script>
//
//  PART 1 — CONFIG + HELPERS + CORS-FIXED URL
//

// CORS-safe BOM feed
const BOM_URL =
  "https://api.allorigins.win/raw?url=https://reg.bom.gov.au/fwo/IDQ60920.xml";

// Correct bom-ids for your four stations
const STATIONS = {
  nambour: "040988",
  beerburrum: "040284",
  sunshine: "040861",
  tewantin: "040908"
};

// Trend memory
let lastTemp = { nambour: null, beerburrum: null, sunshine: null, tewantin: null };
let lastFFDI = { nambour: null, beerburrum: null, sunshine: null, tewantin: null };

// Sparkline history
let ffdiHistory = {
  nambour: [],
  beerburrum: [],
  sunshine: [],
  tewantin: []
};

// Colour helper
function colour(value, thresholds) {
  if (value === "–" || value === null) return "#eee";
  const v = Number(value);
  if (v <= thresholds.green) return "#6f6";
  if (v <= thresholds.yellow) return "#ff6";
  return "#f66";
}

// Temperature trend arrow
function trendArrow(prefix, newTemp) {
  const old = lastTemp[prefix];
  lastTemp[prefix] = newTemp;

  if (old === null || newTemp === "–" || newTemp === null) return "";
  const diff = newTemp - old;

  if (diff > 0.2) return " ▲";
  if (diff < -0.2) return " ▼";
  return " →";
}

// FFDI calculation
function calcFFDI(temp, rh, wind, df = 8) {
  if (temp === "–" || rh === "–" || wind === "–") return null;
  const T = Number(temp);
  const H = Number(rh);
  const W = Number(wind);
  return 2.0 * Math.exp(
    -0.45 +
    0.987 * Math.log(df) -
    0.0345 * H +
    0.0338 * T +
    0.0234 * W
  );
}

// AFDRS-style category mapping
function fdrCategory(ffdi) {
  if (ffdi === null) return { cat: "–", colour: "#666", text: "#fff" };

  if (ffdi < 12) return { cat: "MODERATE", colour: "#4CAF50", text: "#fff" };
  if (ffdi < 24) return { cat: "HIGH", colour: "#FFEB3B", text: "#000" };
  if (ffdi < 50) return { cat: "EXTREME", colour: "#FF9800", text: "#fff" };
  if (ffdi < 75) return { cat: "CATASTROPHIC", colour: "#F44336", text: "#fff" };
  return { cat: "NO-GO", colour: "#000", text: "#fff" };
}

// FFDI trend arrow
function ffdTrend(prefix, newVal) {
  const old = lastFFDI[prefix];
  lastFFDI[prefix] = newVal;

  if (old === null || newVal === null) return "";
  const diff = newVal - old;

  if (diff > 1) return " ▲";
  if (diff < -1) return " ▼";
  return " →";
}

// Sparkline drawing
function drawSpark(prefix) {
  const canvas = document.getElementById(prefix + "-ffdi-spark");
  if (!canvas) return;

  const ctx = canvas.getContext("2d");
  const data = ffdiHistory[prefix];

  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (data.length < 2) return;

  const max = Math.max(...data);
  const min = Math.min(...data);

  ctx.strokeStyle = "#4FC3F7";
  ctx.lineWidth = 2;
  ctx.beginPath();

  data.forEach((v, i) => {
    const x = (i / (data.length - 1)) * canvas.width;
    const y = canvas.height - ((v - min) / (max - min || 1)) * canvas.height;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });

  ctx.stroke();
}

// XML helpers
function getVal(node, type) {
  const el = node.querySelector(`element[type="${type}"]`);
  return el ? el.getAttribute("value") : "–";
}

function getTime(node) {
  const p = node.querySelector("period");
  return p ? (p.getAttribute("time-local") || p.getAttribute("time-utc")) : "–";
}
//
//  PART 2 — update(), load(), station matching, interval
//

function update(prefix, node) {
  if (!node) {
    document.getElementById(prefix + "-error").textContent =
      "No data available.";
    return;
  }

  const temp = getVal(node, "air_temperature");
  const dew = getVal(node, "dew_point");
  const rh = getVal(node, "relative_humidity");
  const wdir = getVal(node, "wind_direction");
  const wspd = getVal(node, "wind_speed_kmh");
  const gust = getVal(node, "gust_kmh");
  const rain = getVal(node, "rainfall_since_9am");

  const arrow = trendArrow(prefix, temp === "–" ? null : Number(temp));

  document.getElementById(prefix + "-temp").textContent = temp + arrow;
  document.getElementById(prefix + "-dew").textContent = dew;
  document.getElementById(prefix + "-rh").textContent = rh;
  document.getElementById(prefix + "-wdir").textContent = wdir;
  document.getElementById(prefix + "-wspd").textContent = wspd;
  document.getElementById(prefix + "-gust").textContent = gust;
  document.getElementById(prefix + "-rain").textContent = rain;
  document.getElementById(prefix + "-time").textContent =
    "Obs time: " + getTime(node);

  // Colour coding
  document.getElementById(prefix + "-rh").style.color =
    colour(rh, { green: 70, yellow: 40 });

  document.getElementById(prefix + "-wspd").style.color =
    colour(wspd, { green: 10, yellow: 25 });

  document.getElementById(prefix + "-gust").style.color =
    colour(gust, { green: 20, yellow: 40 });

  // Wind arrow rotation
  const arrowEl = document.getElementById(prefix + "-wdir-arrow");
  if (arrowEl && wdir !== "–") {
    const dirMap = {
      N: 0, NNE: 22.5, NE: 45, ENE: 67.5,
      E: 90, ESE: 112.5, SE: 135, SSE: 157.5,
      S: 180, SSW: 202.5, SW: 225, WSW: 247.5,
      W: 270, WNW: 292.5, NW: 315, NNW: 337.5
    };
    const deg = dirMap[wdir] ?? 0;
    arrowEl.style.transform = `rotate(${deg}deg)`;
  }

  // FFDI + AFDRS-style category
  const ffdi = calcFFDI(temp, rh, wspd);
  const trend = ffdTrend(prefix, ffdi);
  const ffdiText = ffdi ? ffdi.toFixed(0) + trend : "–";
  document.getElementById(prefix + "-fdr").textContent = ffdiText;

  const fdr = fdrCategory(ffdi);
  const badge = document.getElementById(prefix + "-fdr-badge");
  badge.textContent = fdr.cat;
  badge.style.background = fdr.colour;
  badge.style.color = fdr.text || "#fff";

  // FFDI history + sparkline
  if (ffdi) {
    ffdiHistory[prefix].push(ffdi);
    if (ffdiHistory[prefix].length > 20) ffdiHistory[prefix].shift();
    drawSpark(prefix);
  }
}

async function load() {
  try {
    const res = await fetch(BOM_URL);
    const xmlText = await res.text();
    const xml = new DOMParser().parseFromString(xmlText, "application/xml");
    const stations = [...xml.querySelectorAll("station")];

    update(
      "nambour",
      stations.find((s) => s.getAttribute("bom-id") === STATIONS.nambour)
    );
    update(
      "beerburrum",
      stations.find((s) => s.getAttribute("bom-id") === STATIONS.beerburrum)
    );
    update(
      "sunshine",
      stations.find((s) => s.getAttribute("bom-id") === STATIONS.sunshine)
    );
    update(
      "tewantin",
      stations.find((s) => s.getAttribute("bom-id") === STATIONS.tewantin)
    );
  } catch (e) {
    document.getElementById("nambour-error").textContent = "Error loading data.";
    document.getElementById("beerburrum-error").textContent =
      "Error loading data.";
    document.getElementById("sunshine-error").textContent =
      "Error loading data.";
    document.getElementById("tewantin-error").textContent =
      "Error loading data.";
  }
}

load();
setInterval(load, 10 * 60 * 1000);
</script>
