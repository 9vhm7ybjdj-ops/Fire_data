<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunshine Coast Weather Dashboard</title>

  <style>
    :root {
      --bg: #050814;
      --card-bg: #0b1020;
      --border-soft: rgba(255,255,255,0.08);
      --text-main: #f5f7ff;
      --text-muted: #9aa0c2;
      --accent: #00e5ff;
    }

    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #101632 0, #050814 55%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 16px;
    }

    .fade-in {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeIn 0.6s ease-out forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ---------- MAIN LAYOUT ---------- */
    #dashboard {
      width: 100%;
      max-width: 1100px;
      display: none;
      gap: 14px;
      grid-template-columns: 2fr 1.3fr;
    }

    @media (max-width: 820px) {
      #dashboard {
        grid-template-columns: 1fr;
      }
    }

    /* ---------- TILE GRID ---------- */
    .tiles-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (max-width: 620px) {
      .tiles-grid {
        grid-template-columns: 1fr;
      }
    }

    .tile {
      background: var(--card-bg);
      border: 1px solid var(--border-soft);
      border-radius: 14px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      overflow: hidden;
    }

    .tile h2 {
      margin: 0 0 6px 0;
      font-size: 1rem;
      font-weight: 600;
    }

    .metric-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
    }

    .wind-dir-block {
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .wind-arrow {
      width: 22px;
      height: 22px;
      transition: transform 0.4s ease;
    }

    .gust-pulse {
      animation: gustPulse 1.1s ease-out infinite;
    }

    @keyframes gustPulse {
      0% { box-shadow: 0 0 0 0 rgba(0,229,255,0.0); }
      40% { box-shadow: 0 0 0 6px rgba(0,229,255,0.25); }
      100% { box-shadow: 0 0 0 0 rgba(0,229,255,0.0); }
    }

    /* ---------- COMPASS CARD ---------- */
    .compass-card {
      background: var(--card-bg);
      border: 1px solid var(--border-soft);
      border-radius: 14px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .compass-circle {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      margin: auto;
      position: relative;
      background: radial-gradient(circle at top, rgba(0,229,255,0.12), rgba(0,0,0,0.95));
    }

    .compass-label {
      position: absolute;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .compass-label.n { top: 4px; left: 50%; transform: translateX(-50%); }
    .compass-label.s { bottom: 4px; left: 50%; transform: translateX(-50%); }
    .compass-label.e { right: 4px; top: 50%; transform: translateY(-50%); }
    .compass-label.w { left: 4px; top: 50%; transform: translateY(-50%); }

    .compass-arrow {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 50% 85%;
      transition: transform 0.35s ease-out;
    }

    .compass-arrow svg {
      width: 70px;
      height: 70px;
    }

    /* ---------- MODAL ---------- */
    #station-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    .modal-box {
      width: 90%;
      max-width: 420px;
      background: var(--card-bg);
      border: 1px solid var(--border-soft);
      border-radius: 16px;
      padding: 16px;
    }

    .modal-box h3 {
      margin: 0 0 8px 0;
      color: var(--accent);
    }

    .modal-box select {
      width: 100%;
      padding: 8px;
      border-radius: 10px;
      border: 1px solid var(--border-soft);
      background: #000;
      color: var(--text-main);
      margin-bottom: 12px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn {
      padding: 7px 12px;
      border-radius: 10px;
      border: 1px solid var(--border-soft);
      background: #000;
      color: var(--text-main);
      cursor: pointer;
    }

    .btn.primary {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>

<body>

  <!-- ---------- MODAL ---------- -->
  <div id="station-modal">
    <div class="modal-box">
      <h3>Select Primary Station</h3>
      <p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:10px;">
        This station drives the compass overlay.
      </p>

      <select id="station-select">
        <option value="nambour">Nambour</option>
        <option value="beerburrum">Beerburrum</option>
        <option value="sunshine">Sunshine Coast Airport</option>
        <option value="tewantin">Tewantin</option>
      </select>

      <div class="modal-actions">
        <button class="btn primary" id="continue-btn">Continue</button>
      </div>
    </div>
  </div>

  <!-- ---------- DASHBOARD ---------- -->
  <div id="dashboard" class="fade-in">

    <!-- LEFT: STATION TILES -->
    <div class="tiles-grid">
      <div class="tile" id="nambour">
        <h2>Nambour</h2>
      </div>

      <div class="tile" id="beerburrum">
        <h2>Beerburrum</h2>
      </div>

      <div class="tile" id="sunshine">
        <h2>Sunshine Coast Airport</h2>
      </div>

      <div class="tile" id="tewantin">
        <h2>Tewantin</h2>
      </div>
    </div>

    <!-- RIGHT: COMPASS -->
    <div class="compass-card">
      <h2 style="margin:0; font-size:1rem;">Compass Overlay</h2>
      <div id="nearest-label" style="font-size:0.85rem; color:var(--text-muted);">
        Wind from: --
      </div>

      <div class="compass-circle">
        <div class="compass-label n">N</div>
        <div class="compass-label e">E</div>
        <div class="compass-label s">S</div>
        <div class="compass-label w">W</div>

        <div class="compass-arrow" id="wind-arrow">
          <svg viewBox="0 0 24 24">
            <polygon points="12,2 16,10 12,8 8,10" fill="#00e5ff"></polygon>
            <line x1="12" y1="8" x2="12" y2="22" stroke="#00e5ff" stroke-width="2"></line>
          </svg>
        </div>

        <div class="compass-arrow" id="device-arrow">
          <svg viewBox="0 0 24 24">
            <polygon points="12,2 16,10 12,8 8,10" fill="#ffeb3b"></polygon>
            <line x1="12" y1="8" x2="12" y2="22" stroke="#ffeb3b" stroke-width="2"></line>
          </svg>
        </div>
      </div>
    </div>

  </div>
<script>
/* ---------- WIND DIRECTION TEXT ---------- */
function degToCompass(deg){
  const dirs=["N","NNE","NE","ENE","E","ESE","SE","SSE",
              "S","SSW","SW","WSW","W","WNW","NW","NNW"];
  return dirs[Math.round(deg/22.5)%16];
}

/* ---------- STATION LIST ---------- */
const stations = {
  nambour:{name:"Nambour",lat:-26.63,lon:152.96},
  beerburrum:{name:"Beerburrum",lat:-26.95,lon:153.06},
  sunshine:{name:"Sunshine Coast Airport",lat:-26.60,lon:153.09},
  tewantin:{name:"Tewantin",lat:-26.39,lon:153.03}
};

/* ---------- DATE HELPER ---------- */
function getPastDate(d){
  const x=new Date();
  x.setDate(x.getDate()-d);
  return x.toISOString().split("T")[0];
}

/* ---------- FETCH WEATHER FOR ONE STATION ---------- */
async function loadStation(id){
  const st = stations[id];

  const nowUrl = "https://api.open-meteo.com/v1/forecast?"+new URLSearchParams({
    latitude:st.lat,
    longitude:st.lon,
    current:"temperature_2m,apparent_temperature,dew_point_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m,wind_gusts_10m",
    timezone:"Australia/Brisbane"
  });

  const rainUrl = "https://archive-api.open-meteo.com/v1/archive?"+new URLSearchParams({
    latitude:st.lat,
    longitude:st.lon,
    start_date:getPastDate(1),
    end_date:getPastDate(0),
    daily:"precipitation_sum",
    timezone:"Australia/Brisbane"
  });

  try{
    const [nowRes, rainRes] = await Promise.all([fetch(nowUrl), fetch(rainUrl)]);
    const now = await nowRes.json();
    const rain = await rainRes.json();

    const c = now.current;
    const rain24 = rain.daily?.precipitation_sum?.[0] ?? 0;

    st.windDir = c.wind_direction_10m;

    /* ---------- BUILD TILE HTML ---------- */
    const tile = document.getElementById(id);
    tile.innerHTML = `
      <h2>${st.name}</h2>

      <div class="metric-row"><span>Temp</span><span>${c.temperature_2m}°C</span></div>
      <div class="metric-row"><span>Feels like</span><span>${c.apparent_temperature}°C</span></div>
      <div class="metric-row"><span>Humidity</span><span>${c.relative_humidity_2m}%</span></div>
      <div class="metric-row"><span>Dew point</span><span>${c.dew_point_2m}°C</span></div>
      <div class="metric-row"><span>Wind</span><span>${c.wind_speed_10m} km/h</span></div>
      <div class="metric-row"><span>Gusts</span><span>${c.wind_gusts_10m} km/h</span></div>
      <div class="metric-row"><span>Rain (24h)</span><span>${rain24} mm</span></div>

      <div class="wind-dir-block">
        <svg class="wind-arrow" viewBox="0 0 24 24">
          <polygon points="12,2 16,10 12,8 8,10" fill="#00e5ff"></polygon>
          <line x1="12" y1="8" x2="12" y2="22" stroke="#00e5ff" stroke-width="2"></line>
        </svg>
        <span class="wind-dir-text">${degToCompass(st.windDir)}</span>
      </div>
    `;

    /* ---------- ROTATE ARROW ---------- */
    const arrow = tile.querySelector(".wind-arrow");
    arrow.style.transform = `rotate(${st.windDir}deg)`;

    /* ---------- GUST PULSE ---------- */
    if(c.wind_gusts_10m > c.wind_speed_10m + 5){
      tile.classList.add("gust-pulse");
    } else {
      tile.classList.remove("gust-pulse");
    }

  }catch(e){
    console.error("Station failed:", id, e);
    document.getElementById(id).innerHTML = "<h2>"+stations[id].name+"</h2>Error loading data";
  }
}

/* ---------- COMPASS ---------- */
function initCompass(stationId){
  const st = stations[stationId];
  const windArrow = document.getElementById("wind-arrow");
  const label = document.getElementById("nearest-label");

  if(typeof st.windDir === "number"){
    windArrow.style.transform = `translate(-50%, -85%) rotate(${st.windDir}deg)`;
    label.textContent = `Wind from: ${st.name}`;
  } else {
    label.textContent = `Wind from: ${st.name} (no direction data)`;
  }

  /* DEVICE ORIENTATION */
  if(window.DeviceOrientationEvent){
    function handle(event){
      let heading = event.alpha;

      if(typeof event.webkitCompassHeading === "number"){
        heading = event.webkitCompassHeading;
      }

      if(typeof heading === "number"){
        document.getElementById("device-arrow").style.transform =
          `translate(-50%, -85%) rotate(${heading}deg)`;
      }
    }

    window.addEventListener("deviceorientation", handle, true);
  }
}

/* ---------- MODAL FLOW ---------- */
document.getElementById("continue-btn").onclick = async () => {
  const chosen = document.getElementById("station-select").value;

  document.getElementById("station-modal").style.display = "none";

  const dash = document.getElementById("dashboard");
  dash.style.display = "grid";
  dash.classList.add("fade-in");

  await Promise.all(Object.keys(stations).map(loadStation));

  initCompass(chosen);
};

document.getElementById("change-station-btn")?.addEventListener("click", () => {
  document.getElementById("station-modal").style.display = "flex";
  document.getElementById("dashboard").style.display = "none";
});
</script>

</body>
</html>
