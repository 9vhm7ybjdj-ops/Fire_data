<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Open‑Meteo Test – Beerburrum</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #0b1020;
    color: #fff;
    padding: 20px;
  }
  h1 { margin-bottom: 0.5rem; }
  pre {
    background: #111628;
    padding: 1rem;
    border-radius: 8px;
    overflow-x: auto;
    border: 1px solid #222842;
  }
</style>
</head>
<body>

<h1>Open‑Meteo Test – Beerburrum</h1>
<p>Simple test to confirm Open‑Meteo data loads correctly.</p>

<h3>Current Weather:</h3>
<pre id="weather">Loading…</pre>

<script>
async function fetchWeather() {
  const lat = -26.95;
  const lon = 153.06;

  const url = "https://api.open-meteo.com/v1/forecast?" +
    new URLSearchParams({
      latitude: lat,
      longitude: lon,
      current: "temperature_2m,relative_humidity_2m,wind_speed_10m,precipitation",
      timezone: "Australia/Brisbane"
    });

  const res = await fetch(url);
  if (!res.ok) throw new Error("Failed to fetch weather: " + res.status);

  const data = await res.json();
  return data.current;
}

(async () => {
  try {
    const w = await fetchWeather();

    document.getElementById("weather").textContent =
      `Temperature: ${w.temperature_2m}°C\n` +
      `Humidity: ${w.relative_humidity_2m}%\n` +
      `Wind: ${w.wind_speed_10m} km/h\n` +
      `Rain (current): ${w.precipitation} mm`;
  } catch (err) {
    document.getElementById("weather").textContent = "Error loading data";
    console.error(err);
  }
})();
</script>

</body>
</html>
