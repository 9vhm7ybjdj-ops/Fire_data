<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fireground WX Data MFD</title>

  <!-- Core Styles -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/crt.css" />
  <link rel="stylesheet" href="css/modes.css" />
  <link rel="stylesheet" href="css/lcd.css" />
  <link rel="stylesheet" href="css/tiles.css" />
  <link rel="stylesheet" href="css/maps.css" />
  <link rel="stylesheet" href="css/airfieldwx.css" />
</head>

<body>

  <!-- Responsive Scaling Wrapper -->
  <div id="mfd-scale-wrapper">
    <div id="mfd-frame">

      <!-- BEZEL + BUTTONS -->
      <div id="bezel">

        <!-- LEFT VERTICAL BUTTON STACK -->
        <div class="button-column left">
          <button class="mfd-button" data-page="wx">WX</button>
          <button class="mfd-button" data-page="radar">RADAR</button>
          <button class="mfd-button" data-page="satellite">SAT</button>
          <button class="mfd-button" data-page="combo">COMBO</button>
          <button class="mfd-button" data-page="airfieldwx">AIRFIELD WX</button>
        </div>

        <!-- CRT DISPLAY -->
        <div id="crt">
          <!-- PAGE: WX -->
          <div id="page-wx" class="page">
            <div id="wx-grid"></div>
          </div>

          <!-- PAGE: RADAR -->
          <div id="page-radar" class="page">
            <div id="radar-map" class="map-container"></div>
          </div>

          <!-- PAGE: SATELLITE -->
          <div id="page-satellite" class="page">
            <div id="satellite-map" class="map-container"></div>
          </div>

          <!-- PAGE: COMBO -->
          <div id="page-combo" class="page">
            <div id="combo-map" class="map-container"></div>
          </div>

          <!-- PAGE: AIRFIELD WX (METAR/TAF) -->
          <div id="page-airfieldwx" class="page">
            <div id="airfieldwx-container"></div>
          </div>
        </div>

        <!-- RIGHT VERTICAL BUTTON STACK -->
        <div class="button-column right">
          <button id="btn-nvg" class="mfd-button">NVG</button>
          <button id="btn-red" class="mfd-button">RED</button>
          <button id="btn-normal" class="mfd-button">NORM</button>

          <div class="brightness-wrapper">
            <label>BRIGHT</label>
            <input type="range" id="brightness-slider" min="0.3" max="1.5" step="0.01" value="1.0" />
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- JS Modules -->
  <script src="js/core.js"></script>
  <script src="js/modes.js"></script>
  <script src="js/brightness.js"></script>
  <script src="js/wx.js"></script>
  <script src="js/maps.js"></script>
  <script src="js/radar.js"></script>
  <script src="js/satellite.js"></script>
  <script src="js/combo.js"></script>
  <script src="js/airfieldwx.js"></script>

</body>
</html>
