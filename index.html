<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>QFES Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
  }

  #map {
    width: 100vw;
    height: 100vh;
  }

  /* Legend bottom-left */
  .legend {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: rgba(0,0,0,0.75);
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 14px;
    line-height: 1.4;
  }

  .legend-item {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
  }

  .legend-item svg {
    width: 22px;
    height: 22px;
    margin-right: 8px;
  }

  /* FDR widget */
  .fdr-box {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0,0,0,0.75);
    padding: 14px 18px;
    border-radius: 6px;
    font-size: 15px;
  }
</style>
</head>

<body>

<div id="map"></div>

<!-- FDR Widget -->
<div class="fdr-box" id="fdrBox">
  <div><strong>Fire Danger Rating</strong></div>
  <div id="fdrRating">Loading…</div>
  <div id="fdrFbi">FBI —</div>
  <div id="fdrIssued">—</div>
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-item">
    <!-- Vegetation Fire Icon -->
    <svg viewBox="0 0 32 32">
      <rect x="4" y="4" width="24" height="24" fill="white" stroke="black" stroke-width="2" transform="rotate(45 16 16)"/>
      <rect x="15" y="15" width="2" height="7" fill="black"/>
      <path fill="black" d="M12 16c0-2 2-3 4-3s4 1 4 3h-8z"/>
      <path fill="#d32f2f" d="M16 8c2 2 3 4 3 6 0 2-1 4-3 5-2-1-3-3-3-5 0-2 1-4 3-6z"/>
    </svg>
    Vegetation Fire
  </div>

  <div class="legend-item">
    <!-- Permitted Burn Icon -->
    <svg viewBox="0 0 32 32">
      <rect x="4" y="4" width="24" height="24" fill="white" stroke="black" stroke-width="2" transform="rotate(45 16 16)"/>
      <path fill="white" stroke="black" stroke-width="1.5" d="M11 11h10v7l-3 3h-7z"/>
      <path fill="white" stroke="black" stroke-width="1.5" d="M18 18h3l-3 3z"/>
      <path fill="#d32f2f" d="M16 13c1 1 2 2 2 3 0 2-1 3-2 4-1-1-2-2-2-4 0-1 1-2 2-3z"/>
    </svg>
    Permitted Burn
  </div>
</div>

<script>
/* ---------------------------
   QFES ICONS (Leaflet Markers)
---------------------------- */

const vegIcon = L.divIcon({
  className: "",
  html: `
    <svg width="34" height="34" viewBox="0 0 32 32">
      <rect x="4" y="4" width="24" height="24" fill="white" stroke="black" stroke-width="2" transform="rotate(45 16 16)"/>
      <rect x="15" y="15" width="2" height="7" fill="black"/>
      <path fill="black" d="M12 16c0-2 2-3 4-3s4 1 4 3h-8z"/>
      <path fill="#d32f2f" d="M16 8c2 2 3 4 3 6 0 2-1 4-3 5-2-1-3-3-3-5 0-2 1-4 3-6z"/>
    </svg>
  `,
  iconSize: [34, 34],
  iconAnchor: [17, 17]
});

const permIcon = L.divIcon({
  className: "",
  html: `
    <svg width="34" height="34" viewBox="0 0 32 32">
      <rect x="4" y="4" width="24" height="24" fill="white" stroke="black" stroke-width="2" transform="rotate(45 16 16)"/>
      <path fill="white" stroke="black" stroke-width="1.5" d="M11 11h10v7l-3 3h-7z"/>
      <path fill="white" stroke="black" stroke-width="1.5" d="M18 18h3l-3 3z"/>
      <path fill="#d32f2f" d="M16 13c1 1 2 2 2 3 0 2-1 3-2 4-1-1-2-2-2-4 0-1 1-2 2-3z"/>
    </svg>
  `,
  iconSize: [34, 34],
  iconAnchor: [17, 17]
});

/* ---------------------------
   MAP INITIALISATION
---------------------------- */

const map = L.map("map").setView([-26.7, 152.9], 9);

L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19
}).addTo(map);

/* ---------------------------
   FDR + FBI (Queensland XML)
---------------------------- */

async function fetchFdr() {
  try {
    const res = await fetch("https://www.bom.gov.au/feeds/idq13016.xml");
    const xml = await res.text();
    const doc = new DOMParser().parseFromString(xml, "application/xml");

    const districts = [...doc.querySelectorAll("district")];

    const se = districts.find(d =>
      d.querySelector("name")?.textContent.trim().toLowerCase() === "southeast coast"
    );

    if (!se) throw new Error("District not found");

    const rating = se.querySelector("rating_today")?.textContent.trim() || "Unavailable";
    const fbi = se.querySelector("fbi_today")?.textContent.trim() || "—";
    const issued = doc.querySelector("issue-time-local")?.textContent.trim() || "—";

    document.getElementById("fdrRating").textContent = rating;
    document.getElementById("fdrFbi").textContent = "FBI " + fbi;
    document.getElementById("fdrIssued").textContent = issued;

  } catch (err) {
    document.getElementById("fdrRating").textContent = "Unavailable";
    document.getElementById("fdrFbi").textContent = "FBI —";
    document.getElementById("fdrIssued").textContent = "Data unavailable";
  }
}

fetchFdr();

/* ---------------------------
   SAMPLE INCIDENT MARKERS
---------------------------- */

L.marker([-26.68, 152.95], { icon: vegIcon }).addTo(map);
L.marker([-26.72, 152.88], { icon: permIcon }).addTo(map);

</script>
</body>
</html>
