<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MFD Display</title>

  <!-- ============================
       CSS STACK (ORDER MATTERS)
  ============================= -->
  <link rel="stylesheet" href="css/bezel.css">
  <link rel="stylesheet" href="css/buttons.css">
  <link rel="stylesheet" href="css/crt.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/illumination.css">
</head>

<body>

  <!-- ============================
       MFD BEZEL + CRT
  ============================= -->
  <div id="mfd-bezel">

    <!-- CRT GLASS -->
    <div id="crt" class="crt-glass">

      <!-- PAGE CONTAINER -->
      <div id="page-container">

        <!-- ============================
             WX PAGE
        ============================= -->
        <div id="wx-page" class="mfd-page active-page">
          <div id="wx-page-content"></div>
        </div>

        <!-- ============================
             RADAR PAGE
        ============================= -->
        <div id="radar-page" class="mfd-page">
          <canvas id="radar-canvas"></canvas>
        </div>

        <!-- ============================
             SAT PAGE
        ============================= -->
        <div id="sat-page" class="mfd-page">
          <canvas id="sat-canvas"></canvas>
        </div>

        <!-- ============================
             COMBO PAGE
        ============================= -->
        <div id="combo-page" class="mfd-page">
          <canvas id="combo-canvas"></canvas>
        </div>

      </div> <!-- end page-container -->
    </div> <!-- end CRT -->
    <!-- ============================
         LEFT BUTTON COLUMN
    ============================= -->
    <div id="left-buttons">
      <button class="bezel-btn" data-page="wx-page">WX</button>
      <button class="bezel-btn" data-page="radar-page">RADAR</button>
      <button class="bezel-btn" data-page="sat-page">SAT</button>
      <button class="bezel-btn" data-page="combo-page">COMBO</button>
    </div>

    <!-- ============================
         RIGHT BUTTON COLUMN
    ============================= -->
    <div id="right-buttons">
      <button class="bezel-btn" data-action="mode-normal">NORM</button>
      <button class="bezel-btn" data-action="mode-nvg">NVG</button>
      <button class="bezel-btn" data-action="mode-red">RED</button>
      <button class="bezel-btn" data-action="brightness">BRT</button>
    </div>

  </div> <!-- end mfd-bezel -->

  <!-- ============================
       JAVASCRIPT STACK (ORDER MATTERS)
  ============================= -->

  <!-- Core page switching + button routing -->
  <script src="js/core.js"></script>

  <!-- WX engine (Open‑Meteo version) -->
  <script src="js/wx.js"></script>

  <!-- Mode controller (Normal / NVG / Red) -->
  <script src="js/modes.js"></script>

  <!-- Scaling engine (phone‑first, no drift) -->
  <script src="js/scaling.js"></script>

  <!-- Brightness engine (NVG/RED dimming) -->
  <script src="js/brightness.js"></script>

  <!-- Hard LED illumination + click sound -->
  <script src="js/illumination.js"></script>

</body>
</html>
