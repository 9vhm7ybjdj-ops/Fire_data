<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Fire Danger Index – AFDRS Style</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #0b1020;
    color: #fff;
    padding: 20px;
  }
  h1 { margin-bottom: 0.5rem; }

  .bar {
    display: flex;
    height: 40px;
    margin: 20px 0;
    border-radius: 6px;
    overflow: hidden;
    border: 2px solid #333;
    position: relative;
  }

  .seg { flex: 1; }
  .no-rating { background: #ffffff; }
  .moderate  { background: #4CAF50; }
  .high      { background: #FFEB3B; }
  .extreme   { background: #FF9800; }
  .cat       { background: #F44336; }

  .pointer {
    width: 0;
    height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-bottom: 18px solid #fff;
    position: absolute;
    top: 42px;
    transform: translateX(-50%);
  }

  .label {
    text-align: center;
    margin-top: 60px;
    font-size: 1.2rem;
    font-weight: bold;
  }

  pre {
    background: #111628;
    padding: 1rem;
    border-radius: 8px;
    overflow-x: auto;
    border: 1px solid #222842;
  }

  .disclaimer {
    margin-top: 20px;
    font-size: 0.85rem;
    color: #aaa;
    text-align: center;
  }
</style>
</head>
<body>

<h1>Simple Fire Danger Index – AFDRS Style</h1>
<p>Based on today's temperature, humidity, wind, and recent rain.</p>

<div class="bar">
  <div class="seg no-rating"></div>
  <div class="seg moderate"></div>
  <div class="seg high"></div>
  <div class="seg extreme"></div>
  <div class="seg cat"></div>
  <div id="pointer" class="pointer"></div>
</div>

<div id="category" class="label">Loading…</div>

<h3>Details:</h3>
<pre id="details">Loading…</pre>

<p class="disclaimer">
  ⚠️ Estimated data only — not official AFDRS or Bureau of Meteorology ratings.
</p>

<script>
async function fetchWeather() {
  const lat = -26.95;
  const lon = 153.06;

  const nowUrl = "https://api.open-meteo.com/v1/forecast?" +
    new URLSearchParams({
      latitude: lat,
      longitude: lon,
      current: "temperature_2m,relative_humidity_2m,wind_speed_10m",
      timezone: "Australia/Brisbane"
    });

  const rainUrl = "https://archive-api.open-meteo.com/v1/archive?" +
    new URLSearchParams({
      latitude: lat,
      longitude: lon,
      start_date: getPastDate(3),
      end_date: getPastDate(0),
      daily: "precipitation_sum",
      timezone: "Australia/Brisbane"
    });

  const [nowRes, rainRes] = await Promise.all([fetch(nowUrl), fetch(rainUrl)]);
  const now = await nowRes.json();
  const rain = await rainRes.json();

  return {
    temp: now.current.temperature_2m,
    rh: now.current.relative_humidity_2m,
    wind: now.current.wind_speed_10m,
    rain24: rain.daily.precipitation_sum.slice(-1)[0],
    rain72: rain.daily.precipitation_sum.reduce((a, b) => a + b, 0)
  };
}

function getPastDate(days) {
  const d = new Date();
  d.setDate(d.getDate() - days);
  return d.toISOString().split("T")[0];
}

function computeFireIndex(temp, rh, wind, rain24, rain72) {
  let score = 0;
  if (temp >= 35) score += 3;
  else if (temp >= 30) score += 2;
  else if (temp >= 20) score += 1;

  if (wind >= 45) score += 3;
  else if (wind >= 30) score += 2;
  else if (wind >= 15) score += 1;

  if (rh < 20) score += 3;
  else if (rh < 40) score += 2;
  else if (rh < 60) score += 1;

  if (rain24 > 0) score -= 2;
  else if (rain72 > 0) score -= 1;

  if (score < 0) score = 0;
  if (score > 10) score = 10;
  return score;
}

function scoreToCategory(score) {
  if (score <= 1) return "No Rating";
  if (score <= 3) return "Moderate";
  if (score <= 5) return "High";
  if (score <= 7) return "Extreme";
  return "Catastrophic";
}

function movePointer(category) {
  const pointer = document.getElementById("pointer");
  const positions = {
    "No Rating": 10,
    "Moderate": 30,
    "High": 50,
    "Extreme": 70,
    "Catastrophic": 90
  };
  pointer.style.left = positions[category] + "%";
}

(async () => {
  try {
    const w = await fetchWeather();
    const score = computeFireIndex(w.temp, w.rh, w.wind, w.rain24, w.rain72);
    const category = scoreToCategory(score);

    document.getElementById("category").textContent = category;
    movePointer(category);

    document.getElementById("details").textContent =
      `Temp: ${w.temp}°C\n` +
      `Humidity: ${w.rh}%\n` +
      `Wind: ${w.wind} km/h\n` +
      `Rain (24h): ${w.rain24} mm\n` +
      `Rain (72h): ${w.rain72} mm\n\n` +
      `Score: ${score}\n` +
      `Category: ${category}`;

  } catch (err) {
    document.getElementById("category").textContent = "Error loading data";
    document.getElementById("details").textContent = String(err);
    console.error(err);
  }
})();
</script>

</body>
</html>
