<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BOM Fetch Test</title>
</head>
<body>

<h2>BOM Fetch Test</h2>

<button onclick="testFetch()">Run Test</button>

<pre id="output" style="white-space: pre-wrap; background:#222; color:#0f0; padding:10px; margin-top:10px;"></pre>

<script>
async function tryFetch(label, url) {
  const out = document.getElementById("output");
  out.textContent += `\n=== ${label} ===\nURL: ${url}\n`;

  try {
    const res = await fetch(url);
    out.textContent += `Status: ${res.status}\n`;

    const text = await res.text();
    out.textContent += text.slice(0, 500) + "\n...\n";
  } catch (err) {
    out.textContent += "ERROR: " + err + "\n";
  }
}

function testFetch() {
  document.getElementById("output").textContent = "Running tests...\n";

  // 1. Direct BOM (likely to fail due to CORS)
  tryFetch("Direct BOM", "https://www.bom.gov.au/fwo/IDQ60920.xml");

  // 2. AllOrigins proxy
  tryFetch("AllOrigins", "https://api.allorigins.win/raw?url=https://www.bom.gov.au/fwo/IDQ60920.xml");

  // 3. corsproxy.io
  tryFetch("corsproxy.io", "https://corsproxy.io/?https://www.bom.gov.au/fwo/IDQ60920.xml");
}
</script>

</body>
</html>
